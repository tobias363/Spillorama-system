openapi: "3.1.0"
info:
  title: Spillorama Bingo API
  version: "0.1.0"
  description: |
    Backend API for the Spillorama bingo platform.

    **Authentication**: All player and admin endpoints (except `/api/auth/login`,
    `/api/auth/register`, and Swedbank webhooks) require a Bearer token in the
    `Authorization` header obtained from the login or register endpoints.

    **Error shape**: All errors return `{ ok: false, error: { code, message } }`.
    Success responses return `{ ok: true, data: <payload> }`.

servers:
  - url: http://localhost:4000
    description: Local development
  - url: https://api.spillorama.no
    description: Production

tags:
  - name: Auth
    description: Authentication, profile management, and session handling
  - name: KYC
    description: Identity verification (BankID and manual)
  - name: Games
    description: Available games, halls, rooms, and leaderboard
  - name: Wallet
    description: Player wallet, top-ups, and transfers
  - name: Spillevett
    description: Responsible gaming — reports, loss limits, pauses, self-exclusion
  - name: CMS — Public
    description: |
      Public (un-authenticated) read-endpoints for static content (FAQ, Terms,
      About Us, Responsible Gaming, Support, Links). Player-app uses these to
      show static pages BEFORE login. GAP #22 + #33 — see
      docs/architecture/BACKEND_1TO1_GAP_AUDIT_2026-04-24.md.
  - name: Status — Public
    description: |
      Public (un-authenticated) read-endpoints for the system status page
      (`/status`). Spillere og hall-operatører kan sjekke disse ved problemer.
      Cache 30s. BIN-791.
  - name: Payments
    description: Swedbank Pay payment intents and callbacks
  - name: Admin — Auth
    description: Admin login, bootstrap, RBAC
  - name: Admin — Games
    description: Game settings, rooms, draw control
  - name: Admin — Game Catalog
    description: |
      Spillkatalog (master-data) for spilleplan-redesign 2026-05-07. CRUD
      av kataloog-spill med rules (variant/auto-multiplier/explicit), bong-
      farger og priser, premier per fase i øre, og bonus-spill-konfigurasjon.
      Brukes som master-data for `Admin — Game Plans`.
  - name: Admin — Game Plans
    description: |
      Spilleplaner (templates) for spilleplan-redesign 2026-05-07. Plan-
      meta (navn, hall/group, ukedager, tidsvindu) + atomisk drag-and-drop
      av items-listen med per-item bonus-override.
  - name: Admin — Spill 2 Config
    description: |
      Spill 2 (rocket / Tallspill) global singleton-konfig per Tobias-direktiv
      2026-05-08 (parallel til Spill 3). ETT globalt rom for alle haller —
      alltid aktivt mellom åpningstider, auto-start når X bonger er solgt.
      Jackpot-mapping per draw-count og lucky-number-bonus konfigurerbar.
  - name: Admin — Spill 3 Config
    description: |
      Spill 3 (monsterbingo) global singleton-konfig per Tobias-direktiv
      2026-05-08. ETT globalt rom alltid aktivt for alle haller — auto-start
      når X bonger er solgt. Premier kan settes som faste kr-beløp ELLER
      prosent av runde-omsetning. Pause mellom rad-faser konfigurerbar.
  - name: Agent — Game Plan
    description: |
      Master-hall-runtime for spilleplan-redesign 2026-05-07. Hent gjeldende
      plan + currentItem + jackpotSetupRequired-flagg, start/advance posisjon,
      submit jackpot-popup-override, pause/resume. Master-only — kun agentens
      egen hall via GAME1_MASTER_WRITE.
  - name: Admin — Halls
    description: Hall and terminal management, spilleplan
  - name: Admin — Compliance
    description: Player compliance, prize policy, payout audit
  - name: Admin — Ledger
    description: Compliance ledger entries and daily reports
  - name: Admin — Overskudd
    description: Surplus distribution to organisations (pengespillforskriften)
  - name: Payment Requests
    description: Manual cash/bank deposit + withdraw queue (player-side endpoints). BIN-586.
  - name: Admin — Payment Requests
    description: Hall-operator accept/reject for the manual deposit/withdraw queue. BIN-586.
  - name: Players
    description: Player-resource endpoints — profile, GDPR self-service account deletion. BIN-587 B2.1.
  - name: Admin — Users
    description: User-role and hall-assignment management. BIN-591.
  - name: Admin — Players
    description: Player KYC-moderation — list pending/rejected, approve, reject, resubmit, override. BIN-587 B2.2.
  - name: Agent — Auth
    description: Agent-side auth (login/logout/profile/password/avatar/language). BIN-583 B3.1.
  - name: Agent — Shift
    description: Agent shift lifecycle (start/end/current/history). BIN-583 B3.1.
  - name: Admin — Agents
    description: Admin CRUD for agent users (list/create/read/update/soft-delete). BIN-583 B3.1.
  - name: Agent — Transactions
    description: Agent cash-ops (cash-in/out), player lookup + balance, digital/physical ticket sale + cancel, transaction log. BIN-583 B3.2.
  - name: Agent — Settlement
    description: Daglig kasse-oppgjør — control-daily-balance, close-day, PDF-eksport, admin edit. BIN-583 B3.3.
  - name: Agent — Metronia
    description: Metronia ekstern-maskin-integrasjon — ticket create/topup/payout/void + rapporter. BIN-583 B3.4.
  - name: Agent — OK Bingo
    description: OK Bingo ekstern-maskin-integrasjon (SQL Server polling) — ticket create/topup/payout/void + open-day + rapporter. BIN-583 B3.5.
  - name: Security
    description: |
      Browser-emitted security telemetry (CSP-violation reports, etc.). These
      endpoints are unauthenticated by design — browsers send them as a side-
      effect of policy violations. BIN-776.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  schemas:
    ApiSuccess:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          description: Endpoint-specific payload

    ApiError:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: INVALID_INPUT
            message:
              type: string
              example: E-post er påkrevd.

    Session:
      type: object
      properties:
        accessToken:
          type: string
        userId:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [player, operator, support, admin]
        walletId:
          type: string

    AppUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        surname:
          type: string
        phone:
          type: [string, "null"]
        birthDate:
          type: [string, "null"]
          format: date
        role:
          type: string
        walletId:
          type: string
        kycStatus:
          type: string
          enum: [PENDING, VERIFIED, REJECTED]
        kycVerifiedAt:
          type: [string, "null"]
          format: date-time

    WalletAccount:
      type: object
      properties:
        id:
          type: string
        balance:
          type: number
        currency:
          type: string
          example: NOK
        createdAt:
          type: string
          format: date-time

    WalletTransaction:
      type: object
      properties:
        id:
          type: string
        walletId:
          type: string
        type:
          type: string
          enum: [TOPUP, WITHDRAWAL, STAKE, PRIZE, REFUND, TRANSFER_IN, TRANSFER_OUT]
        amount:
          type: number
        reason:
          type: string
        createdAt:
          type: string
          format: date-time

    PlayerCompliance:
      type: object
      properties:
        walletId:
          type: string
        canPlay:
          type: boolean
        selfExcluded:
          type: boolean
        timedPauseUntil:
          type: [string, "null"]
          format: date-time
        dailyLossLimit:
          type: [number, "null"]
        monthlyLossLimit:
          type: [number, "null"]

    AppGame:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        isEnabled:
          type: boolean

    Hall:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        orgNumber:
          type: string
        settlementAccount:
          type: string
        isActive:
          type: boolean

    RoomSummary:
      type: object
      properties:
        code:
          type: string
        gameSlug:
          type: string
        gameStatus:
          type: string
          enum: [NONE, WAITING, RUNNING, ENDED]
        status:
          type: string
          enum: [OPEN, PLAYING, WAITING, ENDED]
        hallId:
          type: [string, "null"]
        nextRoundAt:
          type: [string, "null"]
          format: date-time

    ScheduleSlot:
      type: object
      properties:
        id:
          type: string
        hallId:
          type: string
        gameSlug:
          type: string
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          description: "0=Sunday, 1=Monday, …, 6=Saturday"
        startTime:
          type: string
          example: "19:00"
        isActive:
          type: boolean

    SwedbankIntent:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        walletId:
          type: string
        amountMajor:
          type: number
        status:
          type: string
          enum: [PENDING, PAID, FAILED, CANCELLED]
        paymentUrl:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time

    LeaderboardEntry:
      type: object
      properties:
        nickname:
          type: string
        displayName:
          type: string
        points:
          type: number

    # ── Payment requests (BIN-586) ────────────────────────────────────────

    PaymentRequestKind:
      type: string
      enum: [deposit, withdraw]
      description: Whether the queued request is an incoming (deposit) or outgoing (withdraw) wallet move.

    PaymentRequestStatus:
      type: string
      enum: [PENDING, ACCEPTED, REJECTED]

    PaymentRequest:
      type: object
      required:
        [id, kind, userId, walletId, amountCents, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: "#/components/schemas/PaymentRequestKind"
        userId:
          type: string
        walletId:
          type: string
        amountCents:
          type: integer
          minimum: 1
          description: Amount in minor units (øre). `10000` = 100 NOK.
        hallId:
          type: [string, "null"]
          description: Hall where the request was submitted. HALL_OPERATOR is scoped to their own hall (BIN-591).
        submittedBy:
          type: [string, "null"]
          description: User ID of the actor who submitted the request (terminal staff or the player themselves).
        status:
          $ref: "#/components/schemas/PaymentRequestStatus"
        rejectionReason:
          type: [string, "null"]
        acceptedBy:
          type: [string, "null"]
        acceptedAt:
          type: [string, "null"]
          format: date-time
        rejectedBy:
          type: [string, "null"]
        rejectedAt:
          type: [string, "null"]
          format: date-time
        walletTransactionId:
          type: [string, "null"]
          description: |
            Set once the request is ACCEPTED. Links to the ledger entry that
            credited (deposit) or debited (withdraw) the player's wallet.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DepositRequestInput:
      type: object
      required: [amountCents]
      properties:
        amountCents:
          type: integer
          minimum: 1
        hallId:
          type: string
          description: Optional. Required in practice when HALL_OPERATOR submits on behalf of a player.

    WithdrawRequestInput:
      allOf:
        - $ref: "#/components/schemas/DepositRequestInput"
      description: Same shape as deposit; amount is still positive, direction determined by endpoint.

    AcceptPaymentRequestInput:
      type: object
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/PaymentRequestKind"

    RejectPaymentRequestInput:
      type: object
      required: [type, reason]
      properties:
        type:
          $ref: "#/components/schemas/PaymentRequestKind"
        reason:
          type: string
          minLength: 1
          description: Human-readable rejection reason stored on the row for audit.

    # ── Auth (BIN-587 B2.1 — password reset, email verify) ────────────────

    PasswordResetTokenValid:
      type: object
      description: Returned by GET /api/auth/reset-password/{token} when the token is valid.
      required: [valid, userId]
      properties:
        valid:
          type: boolean
          enum: [true]
        userId:
          type: string

    ResetPasswordInput:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          minLength: 12

    # ── Players (BIN-587 B2.1) ────────────────────────────────────────────

    PlayerProfile:
      type: object
      required: [id, email, displayName, hallId, kycStatus, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        surname:
          type: [string, "null"]
        phone:
          type: [string, "null"]
        hallId:
          type: string
          description: Primary hall association.
        kycStatus:
          type: string
          enum: [PENDING, VERIFIED, REJECTED]
        birthDate:
          type: [string, "null"]
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PlayerProfileUpdateInput:
      type: object
      description: All fields optional — only the supplied fields are updated.
      properties:
        displayName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string

    # ── Admin — Users (BIN-591) ───────────────────────────────────────────

    AdminUserHallAssignmentInput:
      type: object
      required: [hallId]
      properties:
        hallId:
          type: [string, "null"]
          description: |
            Target hall-id for HALL_OPERATOR scoping. Pass `null` (or empty string)
            to clear the assignment. Only meaningful for HALL_OPERATOR — other
            roles ignore the field.

    # ── Admin — Players / KYC-moderation (BIN-587 B2.2) ───────────────────

    KycStatus:
      type: string
      enum: [UNVERIFIED, PENDING, VERIFIED, REJECTED]
      description: |
        Player KYC lifecycle. `UNVERIFIED` = aldri innsendt, `PENDING` = awaiting
        moderator, `VERIFIED` = godkjent, `REJECTED` = avvist (spiller kan sende
        på nytt hvis admin kaller `/resubmit`).

    PlayerSummary:
      type: object
      description: |
        Moderator-view of a player. Strips wallet/session-detaljer — bruk
        `/api/admin/wallets/...` for compliance-visning.
      required: [id, email, displayName, kycStatus, hallId, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        surname:
          type: [string, "null"]
        phone:
          type: [string, "null"]
        kycStatus:
          $ref: "#/components/schemas/KycStatus"
        birthDate:
          type: [string, "null"]
          format: date
        kycVerifiedAt:
          type: [string, "null"]
          format: date-time
        kycProviderRef:
          type: [string, "null"]
          description: Provider-side referanse (BankID-sesjons-id el.l.) hvis tilgjengelig.
        hallId:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        complianceData:
          type: [object, "null"]
          additionalProperties: true
          description: Fri-formet metadata fra KYC-provider — rå payload for audit.

    PlayerDetail:
      allOf:
        - $ref: "#/components/schemas/PlayerSummary"
      description: Detail-response har for øyeblikket samme shape som summary; felt-sett kan utvides uten å bryte client-kontrakt.

    # Alias-navn for briefens terminologi — peker begge på PlayerSummary
    # siden list-endpoints bare differensierer via `kycStatus`-verdien.
    PendingPlayer:
      allOf:
        - $ref: "#/components/schemas/PlayerSummary"
      description: PlayerSummary der `kycStatus=PENDING`.

    RejectedPlayer:
      allOf:
        - $ref: "#/components/schemas/PlayerSummary"
      description: PlayerSummary der `kycStatus=REJECTED`.

    KYCApprovalInput:
      type: object
      description: Body for approve. Note-feltet er valgfritt og trimmes til maks 500 tegn før audit-log.
      properties:
        note:
          type: string
          maxLength: 500

    KYCRejectionInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
          description: Påkrevd. Persistert i audit-log og sendt til spilleren i rejection-e-post.

    KYCOverrideInput:
      type: object
      required: [status, reason]
      description: Admin-only override (PLAYER_KYC_OVERRIDE). Bypasser normal moderator-flyt; krever at `reason` dokumenterer hvorfor.
      properties:
        status:
          $ref: "#/components/schemas/KycStatus"
        reason:
          type: string
          minLength: 1
          maxLength: 500

    AuditActorType:
      type: string
      enum: [USER, ADMIN, HALL_OPERATOR, SUPPORT, PLAYER, SYSTEM]

    AuditLogEntry:
      type: object
      description: |
        Persistert audit-hendelse. Returneres av
        `GET /api/admin/players/{id}/audit` filtrert på `resource=user`.
      required: [id, actorType, action, resource, createdAt]
      properties:
        id:
          type: string
        actorId:
          type: [string, "null"]
        actorType:
          $ref: "#/components/schemas/AuditActorType"
        action:
          type: string
          description: Stable dotted verb, f.eks. `player.kyc.approve`, `player.kyc.reject`, `player.kyc.override`.
        resource:
          type: string
          description: Entity kind, f.eks. `user`.
        resourceId:
          type: [string, "null"]
        details:
          type: object
          additionalProperties: true
          description: Action-spesifikke felt (f.eks. `reason`, `newStatus`, `note`).
        ipAddress:
          type: [string, "null"]
        userAgent:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time

    # ── BIN-583 B3.1: agent-domene ───────────────────────────────────────────
    AgentHallAssignment:
      type: object
      required: [userId, hallId, isPrimary, assignedAt]
      properties:
        userId: { type: string }
        hallId: { type: string }
        isPrimary: { type: boolean }
        assignedAt: { type: string, format: date-time }
        assignedByUserId: { type: [string, "null"] }

    AgentProfile:
      type: object
      required: [userId, email, displayName, role, agentStatus, language, halls, createdAt, updatedAt]
      properties:
        userId: { type: string }
        email: { type: string, format: email }
        displayName: { type: string }
        surname: { type: [string, "null"] }
        phone: { type: [string, "null"] }
        role:
          type: string
          enum: [AGENT]
        agentStatus:
          type: string
          enum: [active, inactive]
        language:
          type: string
          description: ISO-639-1 (nb/nn/en/sv/da). Default nb.
        avatarFilename: { type: [string, "null"] }
        parentUserId: { type: [string, "null"] }
        halls:
          type: array
          items: { $ref: "#/components/schemas/AgentHallAssignment" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AgentShift:
      type: object
      required: [id, userId, hallId, startedAt, isActive, isLoggedOut]
      properties:
        id: { type: string }
        userId: { type: string }
        hallId: { type: string }
        startedAt: { type: string, format: date-time }
        endedAt: { type: [string, "null"], format: date-time }
        isActive: { type: boolean }
        isLoggedOut: { type: boolean }
        isDailyBalanceTransferred: { type: boolean }
        dailyBalance: { type: number }
        totalCashIn: { type: number }
        totalCashOut: { type: number }
        totalCardIn: { type: number }
        totalCardOut: { type: number }
        hallCashBalance: { type: number }
        hallDropsafeBalance: { type: number }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AgentSessionResponse:
      type: object
      required: [accessToken, expiresAt, user, agent]
      properties:
        accessToken: { type: string }
        expiresAt: { type: string, format: date-time }
        user: { $ref: "#/components/schemas/AppUser" }
        agent: { $ref: "#/components/schemas/AgentProfile" }

    # ── BIN-583 B3.2: agent-transaksjon-skjema ───────────────────────────────
    AgentTransaction:
      type: object
      required: [id, shiftId, agentUserId, playerUserId, hallId, actionType,
                 walletDirection, paymentMethod, amount, previousBalance,
                 afterBalance, createdAt]
      properties:
        id: { type: string }
        shiftId: { type: string }
        agentUserId: { type: string }
        playerUserId: { type: string }
        hallId: { type: string }
        actionType:
          type: string
          enum: [CASH_IN, CASH_OUT, TICKET_SALE, TICKET_REGISTER, TICKET_CANCEL, FEE, OTHER]
        walletDirection:
          type: string
          enum: [CREDIT, DEBIT]
        paymentMethod:
          type: string
          enum: [CASH, CARD, WALLET]
        amount: { type: number }
        previousBalance: { type: number }
        afterBalance: { type: number }
        walletTxId: { type: [string, "null"] }
        ticketUniqueId: { type: [string, "null"] }
        externalReference: { type: [string, "null"] }
        notes: { type: [string, "null"] }
        otherData: { type: object, additionalProperties: true }
        relatedTxId: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }

    PhysicalTicketInventory:
      type: object
      required: [uniqueId, batchId, hallId, status, priceCents]
      properties:
        uniqueId: { type: string }
        batchId: { type: string }
        hallId: { type: string }
        status:
          type: string
          enum: [UNSOLD, SOLD, VOIDED]
        priceCents: { type: integer }
        assignedGameId: { type: [string, "null"] }

    PlayerLookupResult:
      type: object
      required: [id, email, displayName]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        displayName: { type: string }
        phone: { type: [string, "null"] }

    PlayerBalanceSnapshot:
      type: object
      required: [playerUserId, walletBalance, displayName, email]
      properties:
        playerUserId: { type: string }
        walletBalance: { type: number }
        displayName: { type: string }
        email: { type: string, format: email }

    # ── BIN-583 B3.3: settlement-skjema ──────────────────────────────────────
    AgentSettlement:
      type: object
      required: [id, shiftId, agentUserId, hallId, businessDate,
                 dailyBalanceAtEnd, reportedCashCount, dailyBalanceDifference,
                 closedByUserId, isForced, createdAt, updatedAt]
      properties:
        id: { type: string }
        shiftId: { type: string }
        agentUserId: { type: string }
        hallId: { type: string }
        businessDate: { type: string, format: date }
        dailyBalanceAtStart: { type: number }
        dailyBalanceAtEnd: { type: number }
        reportedCashCount: { type: number }
        dailyBalanceDifference: { type: number }
        settlementToDropSafe: { type: number }
        withdrawFromTotalBalance: { type: number }
        totalDropSafe: { type: number }
        shiftCashInTotal: { type: number }
        shiftCashOutTotal: { type: number }
        shiftCardInTotal: { type: number }
        shiftCardOutTotal: { type: number }
        settlementNote: { type: [string, "null"] }
        closedByUserId: { type: string }
        isForced: { type: boolean }
        editedByUserId: { type: [string, "null"] }
        editedAt: { type: [string, "null"], format: date-time }
        editReason: { type: [string, "null"] }
        otherData: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ControlDailyBalanceResult:
      type: object
      required: [shiftDailyBalance, reportedDailyBalance, diff, diffPct, severity]
      properties:
        shiftDailyBalance: { type: number }
        reportedDailyBalance: { type: number }
        diff: { type: number }
        diffPct: { type: number }
        severity:
          type: string
          enum: [OK, NOTE_REQUIRED, FORCE_REQUIRED]

    SettlementDateInfo:
      type: object
      required: [expectedBusinessDate, hasPendingPreviousDay]
      properties:
        expectedBusinessDate: { type: string, format: date }
        hasPendingPreviousDay: { type: boolean }
        pendingShiftId: { type: [string, "null"] }

    # ── BIN-583 B3.4: machine-ticket-skjema ──────────────────────────────────
    MachineTicket:
      type: object
      required: [id, machineName, ticketNumber, externalTicketId, hallId,
                 agentUserId, playerUserId, initialAmountCents,
                 currentBalanceCents, isClosed, uniqueTransaction,
                 createdAt, updatedAt]
      properties:
        id: { type: string }
        machineName:
          type: string
          enum: [METRONIA, OK_BINGO]
        ticketNumber: { type: string }
        externalTicketId: { type: string }
        hallId: { type: string }
        shiftId: { type: [string, "null"] }
        agentUserId: { type: string }
        playerUserId: { type: string }
        roomId: { type: [string, "null"] }
        initialAmountCents: { type: integer }
        totalTopupCents: { type: integer }
        currentBalanceCents: { type: integer }
        payoutCents: { type: [integer, "null"] }
        isClosed: { type: boolean }
        closedAt: { type: [string, "null"], format: date-time }
        closedByUserId: { type: [string, "null"] }
        voidAt: { type: [string, "null"], format: date-time }
        voidByUserId: { type: [string, "null"] }
        voidReason: { type: [string, "null"] }
        uniqueTransaction: { type: string }
        otherData: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    MetroniaSalesAggregate:
      type: object
      required: [totalCreatedNok, totalToppedUpNok, totalPaidOutNok, ticketCount, voidCount]
      properties:
        shiftId: { type: [string, "null"] }
        hallId: { type: string }
        totalCreatedNok: { type: number }
        totalToppedUpNok: { type: number }
        totalPaidOutNok: { type: number }
        ticketCount: { type: integer }
        voidCount: { type: integer }

    # ── CMS — Public (GAP #22 + #33) ──────────────────────────────────────
    PublicCmsContent:
      type: object
      description: |
        Published CMS content for public consumption. Stripped down vs.
        admin-view: no `updatedByUserId`, no `createdAt` — only the live
        content + `publishedAt`.
      required: [slug, content, publishedAt]
      properties:
        slug:
          type: string
          enum: [aboutus, terms, support, links, responsible-gaming]
          description: Canonical slug (after alias resolution).
        content:
          type: string
          description: Published content (HTML or plain-text).
        publishedAt:
          type: string
          format: date-time
          description: |
            For regulatoriske slugs: live-versjonens `publishedAt`. For
            ikke-regulatoriske: `app_cms_content.updatedAt`.

    # ── Status — Public (BIN-791) ─────────────────────────────────────────
    PublicStatusIncident:
      type: object
      description: |
        Admin-publisert hendelse synlig på offentlig status-side. Strippet
        for moderator-identitet (`createdByUserId`, `updatedByUserId`
        eksponeres ikke utad).
      required:
        [id, title, description, status, impact, affectedComponents, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 5000
          description: Markdown tillatt. Vises rett under tittelen.
        status:
          type: string
          enum: [investigating, identified, monitoring, resolved]
        impact:
          type: string
          enum: [none, minor, major, critical]
          description: |
            UI-fargekode: `none` = info (grønn), `minor` = gul,
            `major` = oransje, `critical` = rød.
        affectedComponents:
          type: array
          items:
            type: string
          description: |
            Component-IDer som matcher `StatusService.checks[].component`
            (eks. `bingo`, `wallet`).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: [string, "null"]
          format: date-time

    # ── Game Catalog + Game Plans (spilleplan-redesign 2026-05-07) ────────

    TicketColor:
      type: string
      enum: [gul, hvit, lilla]
      description: |
        Bongfarge-whitelist (Tobias bekreftet 3 farger 2026-05-07). Brukes
        både i `GameCatalogEntry.ticketColors`/`ticketPricesCents` og i
        jackpot-overrides på agent-runtime.

    BonusGameSlug:
      type: string
      enum: [mystery, wheel_of_fortune, treasure_chest, color_draft]
      description: |
        Bonus-spill-whitelist. Slug `mystery` rendres som "Mystery Joker" i
        UI via `BONUS_GAME_DISPLAY_NAMES`-mapping.

    PrizeMultiplierMode:
      type: string
      enum: [auto, explicit_per_color]
      description: |
        Premie-modus per katalog-spill.
        - `auto`: billigste bong (5 kr = 500 øre) får base-premie. Dyrere
          bonger får `base × (ticketPrice / 500)`. Bingo-premien er et
          skalar `bingoBase`. Standard for nye hovedspill.
        - `explicit_per_color`: flat pris per bong + eksplisitt gevinst per
          bongfarge. Brukes for spesialspill som Trafikklys / Oddsen.

    PrizesCents:
      type: object
      required: [rad1, rad2, rad3, rad4, bingo]
      description: |
        Premier per fase i øre (cents). For `auto`-modus skal `bingoBase`
        settes (skalar i øre — multiplisert opp for dyrere bonger). For
        `explicit_per_color`-modus skal `bingo` ha per-farge-lookup.
      properties:
        rad1:
          type: integer
          minimum: 0
          description: Rad 1-premie i øre.
        rad2:
          type: integer
          minimum: 0
          description: Rad 2-premie i øre.
        rad3:
          type: integer
          minimum: 0
          description: Rad 3-premie i øre.
        rad4:
          type: integer
          minimum: 0
          description: Rad 4-premie i øre.
        bingoBase:
          type: integer
          minimum: 0
          description: |
            Base bingo-premie i øre for `auto`-modus (billigste bong = 500
            øre). NULL/utelatt for `explicit_per_color`.
        bingo:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
          description: |
            Per-farge bingo-lookup for `explicit_per_color`-modus. Keys må
            matche `ticketColors`-listen og `TicketColor`-enum (`gul`,
            `hvit`, `lilla`). Beholdes også for backwards-compat i auto-modus.

    GameCatalogEntry:
      type: object
      required:
        [
          id,
          slug,
          displayName,
          rules,
          ticketColors,
          ticketPricesCents,
          prizesCents,
          prizeMultiplierMode,
          bonusGameEnabled,
          requiresJackpotSetup,
          isActive,
          sortOrder,
          createdAt,
          updatedAt,
        ]
      description: |
        Master-data-rad for et katalog-spill. Speiler `app_game_catalog`-
        tabellen 1:1. Ticket-priser og premier kommer i ØRE (cents) over
        wire — admin-UI konverterer til/fra kr.
      properties:
        id:
          type: string
        slug:
          type: string
          description: Unik slug (lowercase, kebab-case).
        displayName:
          type: string
        description:
          type: [string, "null"]
        rules:
          type: object
          additionalProperties: true
          description: |
            Variant-spesifikk konfigurasjon. Kjente felter:
            - `gameVariant` (string, optional): "standard" | "trafikklys" |
              "oddsen". Default "standard".
            - `prizesPerRowColor` (object, kun trafikklys): mapping fra
              rad-farge → øre. Brukes ved fullt hus i Trafikklys.
            - `targetDraw` (integer, kun oddsen): trekning hvor `bingoBaseHigh`
              gjelder; ellers `bingoBaseLow`.
            - `bingoBaseHigh` / `bingoBaseLow` (integer øre, kun oddsen).
            Engine-bridge i Fase 4 håndterer `auto`-modus + standard
            `explicit_per_color` — Trafikklys/Oddsen-mekanikker er flagget
            som gjenstående arbeid (PM_HANDOFF_2026-05-07 §1).
        ticketColors:
          type: array
          items:
            $ref: "#/components/schemas/TicketColor"
        ticketPricesCents:
          type: object
          description: |
            Per-bongfarge-pris i øre. Keys må være i `TicketColor`-enum.
          additionalProperties:
            type: integer
            minimum: 1
        prizesCents:
          $ref: "#/components/schemas/PrizesCents"
        prizeMultiplierMode:
          $ref: "#/components/schemas/PrizeMultiplierMode"
        bonusGameSlug:
          oneOf:
            - $ref: "#/components/schemas/BonusGameSlug"
            - type: "null"
          description: Standard bonus-spill for katalogen (kan overstyres per item).
        bonusGameEnabled:
          type: boolean
        requiresJackpotSetup:
          type: boolean
          description: |
            Hvis true, trigger agent-runtime `jackpotSetupRequired`-flagget
            før denne posisjonen kan kjøres. Master må submitte popup via
            `POST /api/agent/game-plan/jackpot-setup`.
        isActive:
          type: boolean
        sortOrder:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdByUserId:
          type: [string, "null"]

    GameCatalogEntryInput:
      type: object
      required: [slug, displayName, prizesCents]
      description: |
        Body for `POST /api/admin/game-catalog`. `id`, `createdAt`,
        `updatedAt`, `createdByUserId` settes server-side.
      properties:
        slug:
          type: string
        displayName:
          type: string
        description:
          type: [string, "null"]
        rules:
          type: object
          additionalProperties: true
        ticketColors:
          type: array
          items:
            $ref: "#/components/schemas/TicketColor"
        ticketPricesCents:
          type: object
          additionalProperties:
            type: integer
            minimum: 1
        prizesCents:
          $ref: "#/components/schemas/PrizesCents"
        prizeMultiplierMode:
          $ref: "#/components/schemas/PrizeMultiplierMode"
        bonusGameSlug:
          oneOf:
            - $ref: "#/components/schemas/BonusGameSlug"
            - type: "null"
        bonusGameEnabled:
          type: boolean
        requiresJackpotSetup:
          type: boolean
        isActive:
          type: boolean
        sortOrder:
          type: integer
          minimum: 0

    GameCatalogEntryUpdateInput:
      type: object
      description: |
        Partial patch for `PUT /api/admin/game-catalog/{id}`. Kun felter
        som er satt blir oppdatert.
      properties:
        slug:
          type: string
        displayName:
          type: string
        description:
          type: [string, "null"]
        rules:
          type: object
          additionalProperties: true
        ticketColors:
          type: array
          items:
            $ref: "#/components/schemas/TicketColor"
        ticketPricesCents:
          type: object
          additionalProperties:
            type: integer
            minimum: 1
        prizesCents:
          $ref: "#/components/schemas/PrizesCents"
        prizeMultiplierMode:
          $ref: "#/components/schemas/PrizeMultiplierMode"
        bonusGameSlug:
          oneOf:
            - $ref: "#/components/schemas/BonusGameSlug"
            - type: "null"
        bonusGameEnabled:
          type: boolean
        requiresJackpotSetup:
          type: boolean
        isActive:
          type: boolean
        sortOrder:
          type: integer
          minimum: 0

    Weekday:
      type: string
      enum: [mon, tue, wed, thu, fri, sat, sun]
      description: |
        Ukedag-whitelist (matcher `Game1ScheduleTickService.WEEKDAY_VALUES`).

    GamePlan:
      type: object
      required:
        [id, name, weekdays, startTime, endTime, isActive, createdAt, updatedAt]
      description: |
        Spilleplan-template (uten items — items hentes via detail-endpoint
        eller via `PUT /items`). Speiler `app_game_plan`-tabellen 1:1.
        XOR mellom `hallId` og `groupOfHallsId` — service-laget håndhever
        at maks én er satt.
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: [string, "null"]
        hallId:
          type: [string, "null"]
        groupOfHallsId:
          type: [string, "null"]
        weekdays:
          type: array
          items:
            $ref: "#/components/schemas/Weekday"
        startTime:
          type: string
          example: "18:00"
          description: '"HH:MM" 24-timersformat (Oslo-tz).'
        endTime:
          type: string
          example: "23:00"
          description: '"HH:MM" 24-timersformat (Oslo-tz).'
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdByUserId:
          type: [string, "null"]

    GamePlanItem:
      type: object
      required: [id, planId, position, gameCatalogId, catalogEntry, createdAt]
      description: |
        Ett item i en plan-sekvens. `catalogEntry` er resolved inline ved
        detail/items-respons så frontend slipper ekstra round-trip.
      properties:
        id:
          type: string
        planId:
          type: string
        position:
          type: integer
          minimum: 1
          description: 1-indeksert posisjon i sekvensen.
        gameCatalogId:
          type: string
        catalogEntry:
          $ref: "#/components/schemas/GameCatalogEntry"
        bonusGameOverride:
          oneOf:
            - $ref: "#/components/schemas/BonusGameSlug"
            - type: "null"
          description: |
            Per-item bonus-spill-override (Tolkning A, 2026-05-07). NULL =
            ingen override — engine-bridge faller tilbake til
            `catalog.bonusGameSlug`. Ikke-NULL overstyrer katalog.
        notes:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time

    GamePlanWithItems:
      allOf:
        - $ref: "#/components/schemas/GamePlan"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/GamePlanItem"

    GamePlanInput:
      type: object
      required: [name, weekdays, startTime, endTime]
      description: |
        Body for `POST /api/admin/game-plans`. Items legges inn separat via
        `PUT /api/admin/game-plans/{id}/items`. XOR mellom `hallId` og
        `groupOfHallsId` håndheves i service-laget.
      properties:
        name:
          type: string
        description:
          type: [string, "null"]
        hallId:
          type: [string, "null"]
        groupOfHallsId:
          type: [string, "null"]
        weekdays:
          type: array
          items:
            $ref: "#/components/schemas/Weekday"
        startTime:
          type: string
        endTime:
          type: string
        isActive:
          type: boolean

    GamePlanUpdateInput:
      type: object
      description: |
        Partial patch for `PUT /api/admin/game-plans/{id}`. Kun felter som
        er satt blir oppdatert. Items oppdateres via egen `/items`-endpoint.
      properties:
        name:
          type: string
        description:
          type: [string, "null"]
        hallId:
          type: [string, "null"]
        groupOfHallsId:
          type: [string, "null"]
        weekdays:
          type: array
          items:
            $ref: "#/components/schemas/Weekday"
        startTime:
          type: string
        endTime:
          type: string
        isActive:
          type: boolean

    GamePlanItemInput:
      type: object
      required: [gameCatalogId]
      description: |
        Ett item i `PUT /api/admin/game-plans/{id}/items`-payload. Posisjon
        er implisitt rekkefølge i `items`-arrayet — ingen eksplisitt
        `position`-felt. Drag-and-drop save sender hele sekvensen atomisk.
      properties:
        gameCatalogId:
          type: string
        bonusGameOverride:
          oneOf:
            - $ref: "#/components/schemas/BonusGameSlug"
            - type: "null"
          description: |
            Tolkning A (2026-05-07): valgfri streng eller null. Whitelist-
            validering skjer i service-laget — ugyldig slug → INVALID_INPUT.
        notes:
          type: [string, "null"]

    SetGamePlanItemsInput:
      type: object
      required: [items]
      description: |
        Body for `PUT /api/admin/game-plans/{id}/items` — REPLACE hele
        sekvensen atomisk (drag-and-drop save).
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GamePlanItemInput"

    GamePlanRunStatus:
      type: string
      enum: [idle, running, paused, finished]

    JackpotOverride:
      type: object
      required: [draw, prizesCents]
      description: |
        Master-submitted jackpot-popup-override for én plan-posisjon. `draw`
        er trekningsnummer (1-90 for Spill 1) hvor jackpot-pattern slår inn;
        `prizesCents` er per-bongfarge øre-beløp.
      properties:
        draw:
          type: integer
          minimum: 1
          maximum: 90
        prizesCents:
          type: object
          additionalProperties:
            type: integer
            minimum: 1
          description: |
            Per-bongfarge premie i øre. Keys må være i `TicketColor`-enum
            (`gul`, `hvit`, `lilla`). Minst én key kreves.

    GamePlanRun:
      type: object
      required:
        [
          id,
          planId,
          hallId,
          businessDate,
          currentPosition,
          status,
          jackpotOverrides,
          createdAt,
          updatedAt,
        ]
      description: |
        Per-(hall, businessDate)-runtime-state for en aktiv plan. Speiler
        `app_game_plan_run`-tabellen 1:1.
      properties:
        id:
          type: string
        planId:
          type: string
        hallId:
          type: string
        businessDate:
          type: string
          format: date
          description: ISO-dato (YYYY-MM-DD) i Oslo-tidssone.
        currentPosition:
          type: integer
          minimum: 0
          description: |
            0 = idle (ikke startet), 1+ = aktiv posisjon eller siste
            ferdige posisjon (kombinert med `status=finished`).
        status:
          $ref: "#/components/schemas/GamePlanRunStatus"
        jackpotOverrides:
          type: object
          description: |
            Mapping fra posisjon (string-keyed for JSON-kompatibilitet) til
            `JackpotOverride`. Eks: `{"3": {draw: 47, prizesCents: {gul: 50000}}}`.
          additionalProperties:
            $ref: "#/components/schemas/JackpotOverride"
        startedAt:
          type: [string, "null"]
          format: date-time
        finishedAt:
          type: [string, "null"]
          format: date-time
        masterUserId:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Spill 3 (monsterbingo) re-design 2026-05-08 ───────────────────────

    Spill3PrizeMode:
      type: string
      enum: [fixed, percentage]
      description: |
        Premie-modus for Spill 3:
          - "fixed":      Faste kr-beløp per fase (uavhengig av omsetning).
                          Krever at `prizeRad1Cents`..`prizeFullHouseCents`
                          er satt. Alle pct-felter er null.
          - "percentage": Prosent av runde-omsetning (totalSold × pct/100).
                          Krever at `prizeRad1Pct`..`prizeFullHousePct` er
                          satt. Alle cents-felter er null. Sum av prosenter
                          må være ≤ 100.

    Spill3Config:
      type: object
      required:
        [
          id,
          minTicketsToStart,
          prizeMode,
          ticketPriceCents,
          pauseBetweenRowsMs,
          openingTimeStart,
          openingTimeEnd,
          active,
          createdAt,
          updatedAt,
        ]
      description: |
        Global singleton-konfig for Spill 3 (monsterbingo). ETT globalt rom
        alltid aktivt — alle haller deltar. Auto-start når
        `minTicketsToStart` bonger er solgt. 5-fase Row 1-4 + Full House,
        `pauseBetweenRowsMs` mellom rad-faser.
      properties:
        id:
          type: string
        minTicketsToStart:
          type: integer
          minimum: 0
          maximum: 1000
          description: |
            Antall bonger som må selges totalt før runden auto-starter.
            0 = umiddelbar start. Endres av admin uten kode-deploy.
        prizeMode:
          $ref: "#/components/schemas/Spill3PrizeMode"
        prizeRad1Cents:
          type: [integer, "null"]
          minimum: 0
          description: Fast premie i øre for Rad 1 (kun fixed-mode).
        prizeRad2Cents:
          type: [integer, "null"]
          minimum: 0
        prizeRad3Cents:
          type: [integer, "null"]
          minimum: 0
        prizeRad4Cents:
          type: [integer, "null"]
          minimum: 0
        prizeFullHouseCents:
          type: [integer, "null"]
          minimum: 0
        prizeRad1Pct:
          type: [number, "null"]
          minimum: 0
          maximum: 100
          description: Prosent av omsetning for Rad 1 (kun percentage-mode).
        prizeRad2Pct:
          type: [number, "null"]
          minimum: 0
          maximum: 100
        prizeRad3Pct:
          type: [number, "null"]
          minimum: 0
          maximum: 100
        prizeRad4Pct:
          type: [number, "null"]
          minimum: 0
          maximum: 100
        prizeFullHousePct:
          type: [number, "null"]
          minimum: 0
          maximum: 100
        ticketPriceCents:
          type: integer
          minimum: 1
          description: |
            Bongpris i øre. Per Tobias-direktiv 2026-05-08: 500 (5 kr) —
            KUN 1 type bong, online-only.
        pauseBetweenRowsMs:
          type: integer
          minimum: 0
          maximum: 60000
          description: |
            Pause mellom rad-faser (Rad 1 → Rad 2 → ...) i millisekunder.
            Default 3000 (3 sek).
        openingTimeStart:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          description: |
            HH:MM 24t — starten på det daglige vinduet hvor nye runder
            kan spawnes (Europe/Oslo). Tobias-direktiv 2026-05-08.
            Default 11:00.
        openingTimeEnd:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          description: |
            HH:MM 24t — slutten på det daglige vinduet. Default 23:00.
            Service-laget håndhever `openingTimeStart < openingTimeEnd`.
        active:
          type: boolean
          description: |
            Singleton-flagg. Kun ÉN rad har `active=TRUE` til enhver tid
            (håndhevet via partial unique index).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        updatedByUserId:
          type: [string, "null"]

    Spill3ConfigUpdateInput:
      type: object
      description: |
        Partial-update for `PUT /api/admin/spill3/config`. Kun feltene som
        faktisk er sendt blir endret. Service-laget validerer prize-mode-
        konsistens etter merge — fixed-mode krever alle cents-felter satt,
        percentage-mode krever alle pct-felter satt.
      properties:
        minTicketsToStart:
          type: integer
          minimum: 0
          maximum: 1000
        prizeMode:
          $ref: "#/components/schemas/Spill3PrizeMode"
        prizeRad1Cents:
          type: [integer, "null"]
          minimum: 0
        prizeRad2Cents:
          type: [integer, "null"]
          minimum: 0
        prizeRad3Cents:
          type: [integer, "null"]
          minimum: 0
        prizeRad4Cents:
          type: [integer, "null"]
          minimum: 0
        prizeFullHouseCents:
          type: [integer, "null"]
          minimum: 0
        prizeRad1Pct:
          type: [number, "null"]
          minimum: 0
          maximum: 100
        prizeRad2Pct:
          type: [number, "null"]
          minimum: 0
          maximum: 100
        prizeRad3Pct:
          type: [number, "null"]
          minimum: 0
          maximum: 100
        prizeRad4Pct:
          type: [number, "null"]
          minimum: 0
          maximum: 100
        prizeFullHousePct:
          type: [number, "null"]
          minimum: 0
          maximum: 100
        ticketPriceCents:
          type: integer
          minimum: 1
        pauseBetweenRowsMs:
          type: integer
          minimum: 0
          maximum: 60000
        openingTimeStart:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          description: |
            HH:MM 24t — daglig vindu (Europe/Oslo) for når runder kan
            starte. Tobias-direktiv 2026-05-08. Service-laget valider er
            `openingTimeStart < openingTimeEnd`.
        openingTimeEnd:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          description: HH:MM 24t — slutten på daglig vindu.

    # ── Spill 2 (rocket) re-design 2026-05-08 ─────────────────────────────

    Spill2JackpotEntry:
      type: object
      required: [price, isCash]
      properties:
        price:
          type: number
          minimum: 0
          description: |
            Premie-verdi.
              - `isCash=true`  → flat øre-beløp delt mellom vinnere
              - `isCash=false` → prosent (0-100) av (ticketCount × ticketPrice)
        isCash:
          type: boolean

    Spill2JackpotTable:
      type: object
      required: ["9", "10", "11", "12", "13", "1421"]
      description: |
        Jackpot-mapping per draw-count. Krever alle 6 keys ("9".."13" +
        "1421"-bucket for [14..21]).
      properties:
        "9":    { $ref: "#/components/schemas/Spill2JackpotEntry" }
        "10":   { $ref: "#/components/schemas/Spill2JackpotEntry" }
        "11":   { $ref: "#/components/schemas/Spill2JackpotEntry" }
        "12":   { $ref: "#/components/schemas/Spill2JackpotEntry" }
        "13":   { $ref: "#/components/schemas/Spill2JackpotEntry" }
        "1421": { $ref: "#/components/schemas/Spill2JackpotEntry" }

    Spill2Config:
      type: object
      required:
        [
          id,
          minTicketsToStart,
          ticketPriceCents,
          roundPauseMs,
          ballIntervalMs,
          jackpotNumberTable,
          luckyNumberEnabled,
          active,
          createdAt,
          updatedAt,
        ]
      description: |
        Global singleton-konfig for Spill 2 (rocket / Tallspill). ETT
        globalt rom alltid aktivt (innenfor åpningstid). Alle haller deltar.
      properties:
        id:
          type: string
        openingTimeStart:
          type: [string, "null"]
          description: |
            HH:MM 24h-format (Europe/Oslo). null = ingen begrensning
            (alltid åpent).
        openingTimeEnd:
          type: [string, "null"]
          description: HH:MM 24h-format. null hvis start også er null.
        minTicketsToStart:
          type: integer
          minimum: 0
          maximum: 1000
          description: Antall bonger som må selges før runden auto-starter. 0 = umiddelbar.
        ticketPriceCents:
          type: integer
          minimum: 1
          description: Bongpris i øre. Default 1000 (10 kr).
        roundPauseMs:
          type: integer
          minimum: 1000
          maximum: 300000
        ballIntervalMs:
          type: integer
          minimum: 1000
          maximum: 10000
        jackpotNumberTable:
          $ref: "#/components/schemas/Spill2JackpotTable"
        luckyNumberEnabled:
          type: boolean
        luckyNumberPrizeCents:
          type: [integer, "null"]
          minimum: 0
          description: |
            Tilleggspremie i øre når aktivert og siste ball ved seier
            matcher rundens lucky-number. Påkrevd hvis `luckyNumberEnabled=true`.
        active:
          type: boolean
          description: |
            Singleton-flagg. Kun ÉN rad har `active=TRUE` til enhver tid
            (håndhevet via partial unique index).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        updatedByUserId:
          type: [string, "null"]

    Spill2ConfigUpdateInput:
      type: object
      description: |
        Partial-update for `PUT /api/admin/spill2/config`. Kun feltene som
        faktisk er sendt blir endret. Service-laget validerer åpningstid-
        konsistens (enten begge null eller begge satt med start < end),
        jackpot-tabell-shape (alle 6 keys), og lucky-number-konsistens
        (enabled=true → prize_cents må være satt).
      properties:
        openingTimeStart:
          type: [string, "null"]
          pattern: "^([0-9]{1,2}):([0-9]{2})$"
        openingTimeEnd:
          type: [string, "null"]
          pattern: "^([0-9]{1,2}):([0-9]{2})$"
        minTicketsToStart:
          type: integer
          minimum: 0
          maximum: 1000
        ticketPriceCents:
          type: integer
          minimum: 1
          maximum: 100000
        roundPauseMs:
          type: integer
          minimum: 1000
          maximum: 300000
        ballIntervalMs:
          type: integer
          minimum: 1000
          maximum: 10000
        jackpotNumberTable:
          $ref: "#/components/schemas/Spill2JackpotTable"
        luckyNumberEnabled:
          type: boolean
        luckyNumberPrizeCents:
          type: [integer, "null"]
          minimum: 0

    CurrentGamePlanResponse:
      type: object
      required:
        [
          hallId,
          businessDate,
          run,
          plan,
          items,
          currentItem,
          nextItem,
          jackpotSetupRequired,
          pendingJackpotOverride,
          isMaster,
        ]
      description: |
        Aggregert respons for `GET /api/agent/game-plan/current`. Hvis ingen
        plan dekker (hall, ukedag) i dag, settes `run`/`plan`/`currentItem`/
        `nextItem` til null og `items` til tom liste — frontend faller
        tilbake til legacy-flyten via `useNewGamePlan=false`.
      properties:
        hallId:
          type: string
        businessDate:
          type: string
          format: date
        run:
          oneOf:
            - $ref: "#/components/schemas/GamePlanRun"
            - type: "null"
        plan:
          oneOf:
            - $ref: "#/components/schemas/GamePlan"
            - type: "null"
          description: |
            Plan-meta uten items (items returneres som top-level felt).
        items:
          type: array
          items:
            type: object
            required: [id, position, catalogEntry]
            properties:
              id:
                type: string
              position:
                type: integer
              notes:
                type: [string, "null"]
              catalogEntry:
                $ref: "#/components/schemas/GameCatalogEntry"
        currentItem:
          oneOf:
            - type: object
              required: [id, position, catalogEntry]
              properties:
                id:
                  type: string
                position:
                  type: integer
                notes:
                  type: [string, "null"]
                catalogEntry:
                  $ref: "#/components/schemas/GameCatalogEntry"
            - type: "null"
        nextItem:
          oneOf:
            - type: object
              required: [id, position, catalogEntry]
              properties:
                id:
                  type: string
                position:
                  type: integer
                notes:
                  type: [string, "null"]
                catalogEntry:
                  $ref: "#/components/schemas/GameCatalogEntry"
            - type: "null"
        jackpotSetupRequired:
          type: boolean
          description: |
            True hvis `currentItem.catalogEntry.requiresJackpotSetup` og
            ingen override er lagret i `run.jackpotOverrides[currentPosition]`.
        pendingJackpotOverride:
          oneOf:
            - $ref: "#/components/schemas/JackpotOverride"
            - type: "null"
          description: |
            Pre-fyll for popup hvis admin har satt override tidligere.
        isMaster:
          type: boolean
          description: |
            True hvis caller er master for planen (ADMIN, eller agentens
            `hallId` matcher `plan.hallId`). Master-only POST-endpoints
            avslår caller med `isMaster=false`.

    JackpotSetupInput:
      type: object
      required: [position, draw, prizesCents]
      description: |
        Body for `POST /api/agent/game-plan/jackpot-setup`.
      properties:
        position:
          type: integer
          minimum: 1
          description: Plan-posisjonen popup gjelder for.
        draw:
          type: integer
          minimum: 1
          maximum: 90
          description: |
            Trekningsnummer hvor jackpot-pattern slår inn. Spill 1 trekker
            maks 90 baller — `draw` over 90 avvises (`INVALID_INPUT`).
        prizesCents:
          type: object
          additionalProperties:
            type: integer
            minimum: 1
          description: |
            Per-bongfarge premie i øre. Keys må være i `TicketColor`-enum.
            Minst én key kreves.

    StartGamePlanResponse:
      type: object
      required: [run]
      description: |
        Respons for `POST /api/agent/game-plan/start`. Når engine-bridge er
        injisert (Fase 4), inkluderer responsen `scheduledGameId` som master-
        UI sender til `/api/agent/game1/start` for å kjøre engine.
      properties:
        run:
          $ref: "#/components/schemas/GamePlanRun"
        scheduledGameId:
          type: [string, "null"]
          description: |
            Engine-bridge `app_game1_scheduled_games`-rad-id, eller null
            hvis bridgen er deaktivert eller feilet (se `bridgeError`).
        bridgeError:
          type: [string, "null"]
          description: |
            DomainError-kode hvis bridgen feilet (eks. `BRIDGE_FAILED`).
            `JACKPOT_SETUP_REQUIRED` og `HALL_NOT_IN_GROUP` propageres som
            400-respons istedet — ikke i dette feltet.

    AdvanceGamePlanResponse:
      type: object
      required: [run, jackpotSetupRequired]
      description: |
        Respons for `POST /api/agent/game-plan/advance`. Hvis nye posisjon
        krever jackpot-popup, returneres `jackpotSetupRequired=true` og
        `nextGame` (katalog-entry-en for nåværende posisjon) — caller MÅ
        kalle `/jackpot-setup` før neste advance.
      properties:
        run:
          $ref: "#/components/schemas/GamePlanRun"
        nextGame:
          oneOf:
            - $ref: "#/components/schemas/GameCatalogEntry"
            - type: "null"
          description: |
            Katalog-entry for nåværende posisjon etter advance, eller null
            hvis run er `finished`.
        jackpotSetupRequired:
          type: boolean
        scheduledGameId:
          type: [string, "null"]
        bridgeError:
          type: [string, "null"]

security:
  - BearerAuth: []

paths:

  # ── Auth ──────────────────────────────────────────────────────────────────

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new player account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, displayName, surname, birthDate]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 12
                  description: Min 12 chars, must include uppercase, lowercase, and digit
                displayName:
                  type: string
                surname:
                  type: string
                birthDate:
                  type: string
                  format: date
                phone:
                  type: string
                complianceData:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Account created — returns session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"
        "401":
          description: Wrong credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/login-phone:
    post:
      tags: [Auth]
      summary: Log in with Norwegian phone number + PIN (REQ-130 / PDF 9 Frontend CR)
      description: |
        Alternativ til /api/auth/login som tar `{ phone, pin }`. `phone`
        normaliseres til kanonisk +47XXXXXXXX-form. `pin` er 4-6 siffer.

        Brukeren må ha satt opp PIN via /api/auth/pin/setup. Etter 5 feilede
        forsøk låses PIN-en (PIN_LOCKED) og krever admin-reset.

        Enumeration-safe: ukjent telefon og feil PIN gir samme feilmelding.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, pin]
              properties:
                phone:
                  type: string
                  description: Norsk telefonnummer (+47XXXXXXXX, eller 8-sifret nasjonalt)
                pin:
                  type: string
                  pattern: "^\\d{4,6}$"
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"
        "400":
          description: INVALID_PHONE / INVALID_PIN / INVALID_CREDENTIALS / PIN_LOCKED / PIN_NOT_CONFIGURED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/pin/setup:
    post:
      tags: [Auth]
      summary: Aktiver eller oppdater 4-6-sifret PIN for innlogging (REQ-130)
      description: |
        Krever auth. Idempotent — setter ny PIN over evt. eksisterende og
        nullstiller failed_attempts/locked_until.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin]
              properties:
                pin:
                  type: string
                  pattern: "^\\d{4,6}$"
      responses:
        "200":
          description: PIN aktivert
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                            enum: [true]
        "400":
          description: INVALID_PIN / PIN_NOT_CONFIGURED / UNAUTHORIZED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/pin/disable:
    post:
      tags: [Auth]
      summary: Deaktiver PIN — krever passord-bekreftelse (REQ-130)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: PIN slettet
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          disabled:
                            type: boolean
                            enum: [true]
        "400":
          description: INVALID_CREDENTIALS / PIN_NOT_CONFIGURED / UNAUTHORIZED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/pin/status:
    get:
      tags: [Auth]
      summary: Hent PIN-status for innlogget bruker (REQ-130)
      responses:
        "200":
          description: PIN-status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                          locked:
                            type: boolean
                          lockedUntil:
                            type: [string, "null"]
                            format: date-time
                          failedAttempts:
                            type: integer
                          lastUsedAt:
                            type: [string, "null"]
                            format: date-time
                          configured:
                            type: boolean
                            description: Om PIN-tjenesten er konfigurert på serveren

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session token
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          loggedOut:
                            type: boolean

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Issue a new token, invalidate the current one
      responses:
        "200":
          description: New session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user's profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AppUser"
    put:
      tags: [Auth]
      summary: Update display name, email, or phone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AppUser"
    delete:
      tags: [Auth]
      summary: Delete the authenticated player's account
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deleted:
                            type: boolean

  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password (requires current password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 12
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          changed:
                            type: boolean

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email (always returns success to prevent user enumeration)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Always succeeds
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sent:
                            type: boolean

  # ── KYC ──────────────────────────────────────────────────────────────────

  /api/kyc/me:
    get:
      tags: [KYC]
      summary: Get the authenticated player's KYC status
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            type: string
                          status:
                            type: string
                            enum: [PENDING, VERIFIED, REJECTED]
                          birthDate:
                            type: [string, "null"]
                            format: date
                          verifiedAt:
                            type: [string, "null"]
                            format: date-time
                          providerReference:
                            type: [string, "null"]

  /api/kyc/verify:
    post:
      tags: [KYC]
      summary: Submit manual KYC verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [birthDate]
              properties:
                birthDate:
                  type: string
                  format: date
                nationalId:
                  type: string
                  description: Norwegian national identity number (personnummer) — redacted in logs
      responses:
        "200":
          description: Verification submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/AppUser"

  /api/auth/bankid/init:
    post:
      tags: [KYC]
      summary: Start a BankID verification session
      responses:
        "200":
          description: BankID session created (or NOT_CONFIGURED if BankID is not wired up)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sessionId:
                            type: string
                          authUrl:
                            type: [string, "null"]
                          status:
                            type: string
                            enum: [PENDING, NOT_CONFIGURED]

  /api/auth/bankid/status/{sessionId}:
    get:
      tags: [KYC]
      summary: Poll BankID verification status
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sessionId:
                            type: string
                          status:
                            type: string
                            enum: [COMPLETE, PENDING, NOT_CONFIGURED]
                          verified:
                            type: boolean

  # ── Games & Rooms ─────────────────────────────────────────────────────────

  /api/games:
    get:
      tags: [Games]
      summary: List all enabled games
      responses:
        "200":
          description: Game list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AppGame"

  /api/games/status:
    get:
      tags: [Games]
      summary: Live status per game slug — used by lobby for Open/Starting/Closed badges
      responses:
        "200":
          description: Map of slug → status entry
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            status:
                              type: string
                              enum: [OPEN, STARTING, CLOSED]
                            nextRoundAt:
                              type: [string, "null"]
                              format: date-time

  /api/games/{slug}/launch:
    post:
      tags: [Games]
      summary: Launch an external game (e.g. Candy) — returns an embed URL
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hallId:
                  type: string
                returnUrl:
                  type: string
                  format: uri
      responses:
        "200":
          description: Embed URL
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          embedUrl:
                            type: string
                          expiresAt:
                            type: [string, "null"]
                            format: date-time

  /api/halls:
    get:
      tags: [Games]
      summary: List active bingo halls
      responses:
        "200":
          description: Hall list
          content:
