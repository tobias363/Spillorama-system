  # ── CMS — Public (GAP #22 + #33) ─────────────────────────────────────────
  #
  # Un-authenticated read-endpoints for static content. Player-app uses
  # these to show static pages BEFORE login (no auth required). Cache:
  # `public, max-age=300` på 200-svar; `no-store` på 404.
  #
  # Implementasjon: apps/backend/src/routes/publicCms.ts. Slugs er
  # whitelisted (CMS_SLUGS i CmsService) og støtter aliaser:
  #   /api/cms/about        → aboutus
  #   /api/cms/about-us     → aboutus
  #   /api/cms/terms-of-service → terms
  #   /api/cms/tos          → terms
  #
  # Regulatoriske slugs (responsible-gaming) krever live-versjon — draft
  # eller approved-versjoner returneres ALDRI utad. Tom-streng-innhold på
  # ikke-regulatoriske slugs gir også 404 (ikke publisert).

  /api/cms/faq:
    get:
      tags: [CMS — Public]
      summary: List published FAQ entries (public, no auth)
      description: |
        Returns FAQ entries sorted by `sortOrder` ASC, `createdAt` ASC.
        Admin-only fields (`createdByUserId`, `updatedByUserId`,
        timestamps) are stripped from the public response.
      security: []
      responses:
        "200":
          description: FAQ list (may be empty)
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=300"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [faqs, count]
                        properties:
                          faqs:
                            type: array
                            items:
                              type: object
                              required: [question, answer, sortOrder]
                              properties:
                                question:
                                  type: string
                                answer:
                                  type: string
                                sortOrder:
                                  type: integer
                                  minimum: 0
                          count:
                            type: integer

  /api/cms/terms:
    get:
      tags: [CMS — Public]
      summary: Get published Terms & Conditions (public, no auth)
      description: |
        Alias `/api/cms/terms-of-service` and `/api/cms/tos` map to the
        same canonical slug `terms`. Returns the published content;
        empty/unpublished content returns 404 with `CMS_NOT_PUBLISHED`.
      security: []
      responses:
        "200":
          description: Published Terms content
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=300"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PublicCmsContent"
        "404":
          description: |
            CMS_NOT_PUBLISHED (slug exists but no published content) /
            CMS_SLUG_NOT_FOUND (unknown slug)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/cms/responsible-gaming:
    get:
      tags: [CMS — Public]
      summary: Get published Responsible Gaming text (public, no auth)
      description: |
        Regulatorisk slug — krever LIVE-versjon (BIN-680 versjons-flyt).
        Draft/review/approved-versjoner returneres aldri utad. Hvis det
        ikke finnes en live-versjon → 404 `CMS_NOT_PUBLISHED`.

        Pengespillforskriften krever at spillere kan lese
        ansvarlig-spill-info FØR innlogging.
      security: []
      responses:
        "200":
          description: Published Responsible Gaming content
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=300"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PublicCmsContent"
        "404":
          description: CMS_NOT_PUBLISHED (no live version yet)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/cms/about:
    get:
      tags: [CMS — Public]
      summary: Get published About Us text (public, no auth)
      description: |
        Alias for canonical slug `aboutus`. Player-app/frontend bruker
        `/api/cms/about` for naturlig URL-form. `/api/cms/aboutus` og
        `/api/cms/about-us` mapper til samme innhold.
      security: []
      responses:
        "200":
          description: Published About Us content
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=300"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PublicCmsContent"
        "404":
          description: CMS_NOT_PUBLISHED / CMS_SLUG_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Status — Public (BIN-791) ─────────────────────────────────────────────
  #
  # Un-authenticated read-endpoints for the public status page (`/status`).
  # Cache: `public, max-age=30` på alle 200-svar — match StatusService sin
  # interne 30s-cache så klient og server-cache havner i synk.
  #
  # Implementasjon: apps/backend/src/routes/publicStatus.ts. Komponent-
  # sjekker er DI'd via apps/backend/src/observability/statusBootstrap.ts.

  /api/status:
    get:
      tags: [Status — Public]
      summary: Hent komponentstatus-snapshot for hele systemet (offentlig, no auth)
      description: |
        Returnerer en aggregert status for alle registrerte komponenter
        (api, database, bingo, rocket, monsterbingo, spillorama, wallet,
        auth, admin, tv). Cachet i 30 sekunder for å avlaste backenden ved
        store hendelser hvor mange spillere refresher samtidig.
      security: []
      responses:
        "200":
          description: Aggregert status
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=30"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [overall, generatedAt, components]
                        properties:
                          overall:
                            type: string
                            enum: [operational, degraded, outage]
                          generatedAt:
                            type: string
                            format: date-time
                          components:
                            type: array
                            items:
                              type: object
                              required:
                                [component, displayName, status, lastCheckedAt]
                              properties:
                                component:
                                  type: string
                                displayName:
                                  type: string
                                status:
                                  type: string
                                  enum: [operational, degraded, outage]
                                message:
                                  type: [string, "null"]
                                lastCheckedAt:
                                  type: string
                                  format: date-time

  /api/status/uptime:
    get:
      tags: [Status — Public]
      summary: Hent 24-timers uptime-historikk per komponent
      description: |
        Returnerer 24 ettime-bøtter per komponent. UI tegner disse som en
        grønn/gul/rød tidslinje. Hver bøtte aggregerer worst-case-status
        for samples som ble registrert i bøtte-perioden.
      security: []
      responses:
        "200":
          description: Per-komponent uptime
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=30"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [uptime]
                        properties:
                          uptime:
                            type: array
                            items:
                              type: object
                              required: [component, displayName, buckets]
                              properties:
                                component:
                                  type: string
                                displayName:
                                  type: string
                                buckets:
                                  type: array
                                  items:
                                    type: object
                                    required:
                                      [startsAt, endsAt, worstStatus, sampleCount]
                                    properties:
                                      startsAt:
                                        type: string
                                        format: date-time
                                      endsAt:
                                        type: string
                                        format: date-time
                                      worstStatus:
                                        type: string
                                        enum: [operational, degraded, outage]
                                      sampleCount:
                                        type: integer
                                        minimum: 0

  /api/status/incidents:
    get:
      tags: [Status — Public]
      summary: Hent aktive + nylige hendelser publisert av admin
      description: |
        Returnerer admin-publiserte incidents. `active` inneholder alle
        ikke-løste hendelser (status != `resolved`). `recent` inneholder
        siste 50 totalt (også løste, for historikk-tabellen).

        Felter som `createdByUserId` / `updatedByUserId` er strippet fra
        det offentlige svaret — moderatoridentitet er ikke offentlig
        informasjon.
      security: []
      responses:
        "200":
          description: Active + recent incidents
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=30"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [active, recent]
                        properties:
                          active:
                            type: array
                            items:
                              $ref: "#/components/schemas/PublicStatusIncident"
                          recent:
                            type: array
                            items:
                              $ref: "#/components/schemas/PublicStatusIncident"

