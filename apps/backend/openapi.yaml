          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Admin — Spill 2 Config (re-design 2026-05-08) ─────────────────────────
  #
  # Spill 2 (rocket / Tallspill) global singleton-konfig (parallel til Spill 3).
  # ETT globalt rom for alle haller — alltid aktivt mellom åpningstider, auto-
  # start på X solgte bonger, jackpot-mapping per draw-count, lucky-number-bonus.
  #
  # RBAC:
  #   GAME_CATALOG_READ:  ADMIN, HALL_OPERATOR, SUPPORT, AGENT
  #   GAME_CATALOG_WRITE: ADMIN
  # Audit: PUT skriver `spill2.config.update`-event via Spill2ConfigService.

  /api/admin/spill2/config:
    get:
      tags: [Admin — Spill 2 Config]
      summary: Hent aktiv Spill 2 global config
      description: |
        Returnerer den eneste aktive (active=TRUE) konfig-raden. Singleton-
        invariant håndheves via partial unique index. Cache TTL ~5 sek —
        endringer slår inn ved neste cache-miss.
      responses:
        "200":
          description: Config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Spill2Config"
        "403":
          description: FORBIDDEN — caller mangler GAME_CATALOG_READ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: |
            CONFIG_MISSING — ingen aktiv konfig-rad finnes. Migrasjon må
            kjøres eller admin må aktivere en rad. Skal aldri skje i prod.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      tags: [Admin — Spill 2 Config]
      summary: Oppdater Spill 2 global config (krever GAME_CATALOG_WRITE)
      description: |
        Partial-update — kun feltene som faktisk er sendt blir endret.
        Service-laget validerer:
          - tall-grenser per felt
          - åpningstid-format og start < end (eller begge null)
          - jackpot-tabell shape (alle 6 keys, valid {price, isCash})
          - luckyNumberEnabled=true → luckyNumberPrizeCents må være satt

        Audit-log-event `spill2.config.update` skrives med før/etter-snapshot.
        Cache invalideres umiddelbart etter update — neste runde-spawn
        leser ny config.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Spill2ConfigUpdateInput"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Spill2Config"
        "400":
          description: |
            INVALID_INPUT — feltgrenser brutt (ugyldig HH:MM, jackpot-key
            mangler, prosent > 100 for isCash=false, etc.) /
            INVALID_CONFIG — åpningstid-konsistens brutt (kun en av
            start/end satt eller start >= end) eller lucky-number aktivert
            uten prize_cents.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: FORBIDDEN — caller mangler GAME_CATALOG_WRITE (kun ADMIN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Admin — Spill 3 Config (re-design 2026-05-08) ─────────────────────────
