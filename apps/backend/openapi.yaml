      description: |
        Diff-håndtering:
        - |diff| ≤ 500 NOK og ≤ 5 % → OK uten note
        - 500 < |diff| ≤ 1000 (eller 5 < |%| ≤ 10) → note required
        - |diff| > 1000 (eller > 10 %) → ADMIN + isForceRequested + note required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reportedCashCount]
              properties:
                reportedCashCount: { type: number, minimum: 0 }
                settlementToDropSafe: { type: number }
                withdrawFromTotalBalance: { type: number }
                totalDropSafe: { type: number }
                settlementNote: { type: string }
                isForceRequested: { type: boolean }
                otherData: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Settlement opprettet
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentSettlement" }
        "400":
          description: NO_ACTIVE_SHIFT / SHIFT_SETTLED / DIFF_NOTE_REQUIRED / ADMIN_FORCE_REQUIRED
