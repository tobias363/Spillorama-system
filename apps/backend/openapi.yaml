  /api/admin/game-plans/{id}/items:
    put:
      tags: [Admin — Game Plans]
      summary: Atomic save av items-listen (drag-and-drop replace)
      description: |
        REPLACE hele plan-sekvensen atomisk. `position` er implisitt — det
        er rekkefølgen i `items`-arrayet (1-indeksert: items[0] → position=1,
        items[1] → position=2, osv). Per-item `bonusGameOverride` validerer
        slug-whitelist server-side.

        Service-laget håndhever atomisitet: enten settes hele sekvensen
        eller ingen — partial saves er ikke mulig.
      parameters:
