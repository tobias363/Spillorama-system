          application/json:
            schema:
              $ref: "#/components/schemas/Spill3ConfigUpdateInput"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Spill3Config"
        "400":
          description: |
            INVALID_INPUT — feltgrenser brutt (ugyldig prizeMode, pct > 100,
            cents < 0, ticketPrice = 0, etc.) /
            INVALID_CONFIG — prize-mode-konsistens brutt (fixed mangler
            cents-felter, percentage mangler pct-felter, eller sum av
            prosenter > 100).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: FORBIDDEN — caller mangler GAME_CATALOG_WRITE (kun ADMIN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Agent — Game Plan (master-runtime 2026-05-07) ─────────────────────────
  #
  # Master-only runtime for spilleplan-redesign. RBAC:
  #   GAME1_MASTER_WRITE — ADMIN, HALL_OPERATOR, AGENT (SUPPORT eksplisitt
  #   utelatt). Hall-scope: GET låser HALL_OPERATOR/AGENT til egen hall;
  #   POST avslår caller med `isMaster=false` (kun master-hallens agent
  #   kan starte/advance/pause/resume + sette jackpot-override).
  # Audit: writes går via GamePlanRunService som skriver
  #   `game_plan_run.{create,start,advance,jackpot_set,pause,resume,finish}`.

  /api/agent/game-plan/current:
    get:
      tags: [Agent — Game Plan]
      summary: Hent gjeldende plan + currentItem + jackpotSetupRequired
      description: |
        Returnerer aggregert state for master-dashboardet. Hvis ingen plan
        dekker (hall, ukedag) i dag, returneres `run=null`/`plan=null`/
        `items=[]` — frontend faller da tilbake til legacy-flyten via
        `useNewGamePlan=false` localStorage-flagg. ADMIN må angi `?hallId=`
        hvis egen `hallId` ikke er satt.
      parameters:
        - in: query
          name: hallId
          required: false
          schema:
            type: string
          description: |
            Kun ADMIN. HALL_OPERATOR/AGENT er låst til egen hall — cross-hall
            queries returnerer 403 FORBIDDEN.
      responses:
        "200":
          description: Aggregert state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CurrentGamePlanResponse"
        "400":
          description: |
            INVALID_INPUT — ADMIN uten egen `hallId` har ikke angitt
            `?hallId=`-query.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: |
            FORBIDDEN — caller mangler GAME1_MASTER_WRITE, eller
            HALL_OPERATOR/AGENT prøvde cross-hall query.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/agent/game-plan/start:
    post:
      tags: [Agent — Game Plan]
      summary: Start neste posisjon (master-only, idle → running)
      description: |
        idle → running, `current_position=1`. Krever at en plan dekker
        (hall, ukedag) for `today` i Oslo-tz, ellers `NO_MATCHING_PLAN`.
        Engine-bridge (Fase 4) kan returnere `scheduledGameId` som master-
        UI sender til `/api/agent/game1/start` for engine-kjøring.

        **Multi-hall ready-check** (legacy "alle haller klar"-popup) skjer
        i UI-laget før dette kallet — backend-runtime fokuserer på
        plan-state.
      responses:
        "200":
          description: Started — run i `running`-state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StartGamePlanResponse"
        "400":
          description: |
            NO_MATCHING_PLAN — ingen aktiv plan dekker (hall, ukedag) i dag.
            JACKPOT_SETUP_REQUIRED — engine-bridge fant at posisjon krever
            jackpot-popup før start (catalog.requiresJackpotSetup=true uten
            override).
            HALL_NOT_IN_GROUP — engine-bridge kunne ikke matche hallen til
            plan.groupOfHallsId.
            INVALID_INPUT — ADMIN uten egen hallId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: |
            FORBIDDEN — caller mangler GAME1_MASTER_WRITE, eller agentens
            hallId matcher ikke `plan.hallId` (ikke master).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: GAME_PLAN_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/agent/game-plan/advance:
    post:
      tags: [Agent — Game Plan]
      summary: Flytt til neste posisjon (master-only)
      description: |
        Inkrementer `current_position`. Hvis nye posisjon krever jackpot-
        popup (`catalog.requiresJackpotSetup=true` og ingen override
        lagret), returneres `jackpotSetupRequired=true` og caller må kalle
        `/jackpot-setup` før neste advance.

        Når siste posisjon passeres, settes `status=finished` og
        `finishedAt`. Engine-bridge oppretter `scheduledGameId` for nye
        posisjon når relevant.
      responses:
        "200":
          description: Advanced
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdvanceGamePlanResponse"
        "400":
          description: |
            GAME_PLAN_RUN_NOT_FOUND — ingen aktiv run for (hall, dato).
            GAME_PLAN_RUN_NOT_RUNNING — run er `idle`/`paused`/`finished`,
            kall `/start` eller `/resume` først.
            JACKPOT_SETUP_REQUIRED — propageres fra engine-bridge.
            HALL_NOT_IN_GROUP — engine-bridge group-mismatch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: FORBIDDEN — caller er ikke master.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/agent/game-plan/jackpot-setup:
    post:
      tags: [Agent — Game Plan]
      summary: Submit jackpot-popup (draw + prizesCents per bongfarge)
      description: |
        Master submitter `draw` + `prizesCents` for nåværende posisjon
        (eller en spesifikk `position`). Override lagres i
        `run.jackpotOverrides[position]`. Etter dette kan master kalle
        `/advance` igjen — `jackpotSetupRequired` skal nå være `false`.

        Server-side validering håndhever:
          - `draw` ∈ [1, 90] (Spill 1 maks 90 baller).
          - `prizesCents` keys må være i `TicketColor`-enum og minst 1 key.
          - Verdier må være positive heltall (øre).
          - Server-laget validerer også mot `catalog.ticketColors` —
            farger ikke i katalogens whitelist gir `INVALID_INPUT`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JackpotSetupInput"
      responses:
        "200":
          description: Override lagret
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [run]
                        properties:
                          run:
                            $ref: "#/components/schemas/GamePlanRun"
        "400":
          description: |
            INVALID_INPUT — `position` ikke positivt heltall, `draw` utenfor
            [1, 90], `prizesCents` ikke objekt, ugyldig bongfarge-key, eller
            ikke-positivt øre-beløp. Også: `prizesCents` farge ikke i
            katalogens `ticketColors`-whitelist.
            GAME_PLAN_RUN_NOT_FOUND — ingen aktiv run for (hall, dato).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: FORBIDDEN — caller er ikke master.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/agent/game-plan/pause:
    post:
      tags: [Agent — Game Plan]
      summary: Pause aktiv plan (running → paused, master-only)
      description: |
        State-overgang for parity med master-UI. Faktisk pause-knapp i
        engine er fortsatt `/api/agent/game1/pause` — denne endepunkten
        oppdaterer kun plan-runtime-state.
      responses:
        "200":
          description: Paused
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [run]
                        properties:
                          run:
                            $ref: "#/components/schemas/GamePlanRun"
        "400":
          description: |
            GAME_PLAN_RUN_NOT_FOUND — ingen aktiv run for (hall, dato).
            GAME_PLAN_RUN_NOT_RUNNING — run er ikke i `running`-state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: FORBIDDEN — caller er ikke master.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/agent/game-plan/resume:
    post:
      tags: [Agent — Game Plan]
      summary: Resume pauset plan (paused → running, master-only)
      responses:
        "200":
          description: Resumed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [run]
                        properties:
                          run:
                            $ref: "#/components/schemas/GamePlanRun"
        "400":
          description: |
            GAME_PLAN_RUN_NOT_FOUND — ingen aktiv run for (hall, dato).
            GAME_PLAN_RUN_NOT_PAUSED — run er ikke i `paused`-state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: FORBIDDEN — caller er ikke master.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

