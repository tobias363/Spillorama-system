name: PM Gate Enforcement

# Blokkerer merge av PR-er som ikke beviser at PM har passert
# pm-checkpoint-gate (BIN-PM-VT, 2026-05-10).
#
# PR-beskrivelsen MÅ inneholde én av disse linjene/markørene:
#
#   gate-confirmed: <hash-prefix>      # 12-tegn-hash fra docs/.pm-confirmations.log
#   Main-SHA i `.pm-onboarding-confirmed.txt`: <git-SHA>   # BIN-PM-VT-checkbox-format
#   gate-bypass: <begrunnelse>         # Eksplisitt bypass m/Tobias-godkjenning
#   gate-not-applicable: <rolle>       # Tobias selv / docs-only / dependabot / ci-bot
#
# Hvis ingen av disse finnes: PR blokkeres fra merge.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check PR description for gate-marker
        id: check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BODY="${PR_BODY:-}"

          CONFIRMED_HASH=$(echo "$BODY" | grep -oE 'gate-confirmed:\s*[a-f0-9]{8,16}' | head -1 || true)
          CONFIRMED_SHA=$(echo "$BODY" | grep -oE 'Main-SHA[^:]*:\s*`?[a-f0-9]{8,40}`?' | head -1 || true)
          BYPASS=$(echo "$BODY" | grep -oE 'gate-bypass:\s*.+' | head -1 || true)
          NOT_APPL=$(echo "$BODY" | grep -oE 'gate-not-applicable:\s*.+' | head -1 || true)

          if [ -n "$CONFIRMED_HASH" ]; then
            HASH=$(echo "$CONFIRMED_HASH" | grep -oE '[a-f0-9]{8,16}')
            if [ -z "$HASH" ] || [ "$HASH" = "00000000" ]; then
              echo "decision=missing" >> "$GITHUB_OUTPUT"
            else
              echo "marker=$HASH" >> "$GITHUB_OUTPUT"
              echo "marker_type=hash" >> "$GITHUB_OUTPUT"
              echo "decision=verify-marker" >> "$GITHUB_OUTPUT"
            fi
          elif [ -n "$CONFIRMED_SHA" ]; then
            SHA=$(echo "$CONFIRMED_SHA" | grep -oE '[a-f0-9]{8,40}' | head -1)
            if [ -z "$SHA" ] || echo "$CONFIRMED_SHA" | grep -qE '__paste_sha_here__|<paste|<sha'; then
              echo "decision=missing" >> "$GITHUB_OUTPUT"
            else
              echo "marker=$SHA" >> "$GITHUB_OUTPUT"
              echo "marker_type=sha" >> "$GITHUB_OUTPUT"
              echo "decision=verify-marker" >> "$GITHUB_OUTPUT"
            fi
          elif [ -n "$BYPASS" ]; then
            echo "decision=bypass" >> "$GITHUB_OUTPUT"
            echo "bypass=$BYPASS" >> "$GITHUB_OUTPUT"
          elif [ -n "$NOT_APPL" ]; then
            echo "decision=not-applicable" >> "$GITHUB_OUTPUT"
            echo "not_applicable=$NOT_APPL" >> "$GITHUB_OUTPUT"
          else
            echo "decision=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify marker exists in .pm-confirmations.log
        if: steps.check.outputs.decision == 'verify-marker'
        run: |
          MARKER="${{ steps.check.outputs.marker }}"
          MARKER_TYPE="${{ steps.check.outputs.marker_type }}"
          LOG="docs/.pm-confirmations.log"

          if [ ! -f "$LOG" ]; then
            echo "::error::Public log $LOG mangler. Hodefilen må committes først."
            exit 1
          fi

          FOUND=0
          if [ "$MARKER_TYPE" = "hash" ]; then
            if grep -qF "| $MARKER |" "$LOG"; then
              FOUND=1
            fi
          else
            if grep -qE "\| ${MARKER}[a-f0-9]*\s*$" "$LOG" || grep -qE "\| [a-f0-9]*${MARKER}\s*$" "$LOG"; then
              FOUND=1
            fi
          fi

          if [ "$FOUND" = "1" ]; then
            echo "::notice::Gate-marker ($MARKER_TYPE: $MARKER) verifisert i $LOG"
          else
            echo "::error::PR-beskrivelse refererer gate-marker '$MARKER' (type: $MARKER_TYPE), men den finnes IKKE i $LOG."
            echo "::error::Kjør lokalt: node scripts/check-pm-gate.mjs --log-public, deretter commit + push docs/.pm-confirmations.log."
            exit 1
          fi

      - name: Validate bypass / not-applicable marker
        if: steps.check.outputs.decision == 'bypass' || steps.check.outputs.decision == 'not-applicable'
        uses: actions/github-script@v7
        env:
          DECISION: ${{ steps.check.outputs.decision }}
          BYPASS: ${{ steps.check.outputs.bypass }}
          NOT_APPLICABLE: ${{ steps.check.outputs.not_applicable }}
          TOBIAS_GITHUB_ACTORS: tobias363,tobias50
        with:
          script: |
            const pr = context.payload.pull_request;
            const decision = process.env.DECISION;
            const labels = new Set((pr.labels || []).map((l) => l.name));
            const approved = labels.has('approved-pm-bypass');

            if (decision === 'bypass') {
              if (!approved) {
                core.setFailed('gate-bypass krever label approved-pm-bypass fra Tobias/CODEOWNER.');
              } else {
                core.warning(`gate-bypass godkjent via approved-pm-bypass: ${process.env.BYPASS}`);
              }
              return;
            }

            const raw = process.env.NOT_APPLICABLE || '';
            const role = raw.replace(/^gate-not-applicable:\s*/i, '').trim().toLowerCase();
            const actor = (pr.user && pr.user.login) || context.actor;
            const tobiasActors = (process.env.TOBIAS_GITHUB_ACTORS || '')
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean);

            if (role === 'docs-only') {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              const nonDocs = files
                .map((f) => f.filename)
                .filter((f) => !f.startsWith('docs/') && !['README.md', 'MASTER_README.md', 'CLAUDE.md'].includes(f));
              if (nonDocs.length === 0) {
                core.notice('gate-not-applicable: docs-only verifisert mot changed files.');
                return;
              }
              core.setFailed(`gate-not-applicable: docs-only brukt, men PR endrer non-docs: ${nonDocs.slice(0, 20).join(', ')}`);
              return;
            }

            if (role === 'dependabot') {
              if (actor.includes('dependabot')) {
                core.notice('gate-not-applicable: dependabot verifisert mot PR author.');
                return;
              }
              core.setFailed(`gate-not-applicable: dependabot brukt, men PR author er ${actor}.`);
              return;
            }

            if (role === 'ci-bot') {
              if (actor.endsWith('[bot]') || actor === 'github-actions') {
                core.notice('gate-not-applicable: ci-bot verifisert mot PR author.');
                return;
              }
              core.setFailed(`gate-not-applicable: ci-bot brukt, men PR author er ${actor}.`);
              return;
            }

            if (role === 'tobias') {
              if (tobiasActors.includes(actor) || approved) {
                core.notice('gate-not-applicable: tobias verifisert mot allowlist eller approved-pm-bypass-label.');
                return;
              }
              core.setFailed(`gate-not-applicable: tobias brukt, men PR author ${actor} er ikke i allowlist og label mangler.`);
              return;
            }

            if (approved) {
              core.warning(`gate-not-applicable: ${role || '(tom)'} akseptert via approved-pm-bypass-label.`);
              return;
            }

            core.setFailed(`Ukjent eller ikke-godkjent gate-not-applicable rolle: "${role}". Bruk docs-only/dependabot/ci-bot/tobias eller label approved-pm-bypass.`);

      - name: Auto-comment if gate-marker missing
        if: steps.check.outputs.decision == 'missing'
        uses: actions/github-script@v7
        with:
          script: |
            const lines = [
              '## ⛔ PM-gate ikke bekreftet',
              '',
              'Denne PR-en mangler gyldig gate-marker. Du må legge til **én** av disse i PR-beskrivelsen:',
              '',
              '```',
              'gate-confirmed: <hash-prefix>      # 12-tegn-hash fra docs/.pm-confirmations.log',
              'gate-bypass: <begrunnelse>         # Eksplisitt bypass m/Tobias-godkjenning',
              'gate-not-applicable: <rolle>      # Tobias selv / docs-only / dependabot / ci-bot',
              '```',
              '',
              'Eller kryss av "Jeg er PM-AI"-checkbox og lim inn faktisk SHA i feltet `__paste_sha_here__` (BIN-PM-VT-format).',
              '',
              '**Hvordan finne hash-prefix:**',
              '',
              '```bash',
              'bash scripts/pm-checkpoint.sh                        # hvis ikke allerede passert',
              'node scripts/check-pm-gate.mjs --log-public          # appender til public audit-trail',
              'tail -1 docs/.pm-confirmations.log                   # andre kolonne er hash',
              '```',
              '',
              'Etter editering av PR-beskrivelse vil workflow re-kjøre automatisk.',
              '',
              '---',
              '',
              'Se `docs/operations/PM_PR_VERIFICATION_DUTY.md` for full regelverk.',
            ];
            const body = lines.join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('PM-gate ikke bekreftet')
            );
            if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
            core.setFailed('PR-beskrivelse mangler gate-marker. Se kommentar over.');

      - name: Bypass logged (informativ)
        if: steps.check.outputs.decision == 'bypass'
        run: |
          echo "::warning::Bypass-marker funnet og validert: '${{ steps.check.outputs.bypass }}'"

      - name: Not-applicable accepted (informativ)
        if: steps.check.outputs.decision == 'not-applicable'
        run: |
          echo "::notice::PR markert ikke-applicable: '${{ steps.check.outputs.not_applicable }}'"
