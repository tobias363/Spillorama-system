name: Skill Freshness Weekly Check

# Tobias-direktiv 2026-05-13 (Tier 3-C / B3): Skills i `.claude/skills/`
# blir stale over tid. Denne workflowen kjører ukentlig og:
#   1. Rapporterer alle skill-statuser til Actions Summary
#   2. Lager GitHub issue hvis ≥ 1 skill er "very-stale"
#      (90+ dager uten oppdatering AND 50+ commits til scope siste 60 dager)
#
# IKKE blokkerende — bare informasjonelt + issue-trigger.
# Se docs/engineering/SKILL_FRESHNESS.md for terskler og hvordan refresh.

on:
  schedule:
    # Mandag 09:00 UTC — start uken med fersk skill-rapport
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      very_stale_only:
        description: "Bare flagg very-stale skills (for testing issue-trigger)"
        required: false
        default: "false"
  push:
    branches: [main]
    paths:
      - "scripts/check-skill-freshness.mjs"
      - ".github/workflows/skill-freshness-weekly.yml"

permissions:
  contents: read
  issues: write

concurrency:
  group: skill-freshness-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full historikk nødvendig for git log --since
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run skill freshness check (full report)
        id: full
        run: |
          mkdir -p /tmp/skill-freshness
          node scripts/check-skill-freshness.mjs \
            --markdown \
            --output=/tmp/skill-freshness/report.md
          node scripts/check-skill-freshness.mjs \
            --output=/tmp/skill-freshness/report.json
          echo "Generated /tmp/skill-freshness/report.md + .json"

      - name: Detect very-stale skills
        id: detect
        run: |
          # Hent count fra JSON-rapport
          VERY_STALE_COUNT=$(node -e "
            const r = JSON.parse(require('fs').readFileSync('/tmp/skill-freshness/report.json', 'utf8'));
            process.stdout.write(String(r.counts['very-stale'] ?? 0));
          ")
          STALE_COUNT=$(node -e "
            const r = JSON.parse(require('fs').readFileSync('/tmp/skill-freshness/report.json', 'utf8'));
            process.stdout.write(String(r.counts.stale ?? 0));
          ")
          SCOPE_UNDEFINED=$(node -e "
            const r = JSON.parse(require('fs').readFileSync('/tmp/skill-freshness/report.json', 'utf8'));
            process.stdout.write(String(r.counts['scope-undefined'] ?? 0));
          ")
          echo "very_stale_count=$VERY_STALE_COUNT" >> "$GITHUB_OUTPUT"
          echo "stale_count=$STALE_COUNT" >> "$GITHUB_OUTPUT"
          echo "scope_undefined=$SCOPE_UNDEFINED" >> "$GITHUB_OUTPUT"
          echo "Very-stale: $VERY_STALE_COUNT, Stale: $STALE_COUNT, Scope-undefined: $SCOPE_UNDEFINED"

      - name: Create issue if very-stale skills found
        if: steps.detect.outputs.very_stale_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/skill-freshness/report.md', 'utf8');
            const veryStaleCount = ${{ steps.detect.outputs.very_stale_count }};
            const staleCount = ${{ steps.detect.outputs.stale_count }};

            // Sjekk om det allerede finnes en åpen issue for samme tema
            // (siste 7 dager) for å unngå støy
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'skill-freshness',
              per_page: 10,
            });

            const oneWeekAgo = new Date(Date.now() - 7 * 86400_000);
            const recent = existingIssues.filter(
              (i) => new Date(i.created_at) > oneWeekAgo,
            );
            if (recent.length > 0) {
              console.log(`Allerede åpen issue ${recent[0].number} — hopper over duplikat-trigger`);
              return;
            }

            const title = `⚠️ ${veryStaleCount} very-stale skill(s) krever review`;
            const lines = [
              '# Skill Freshness Weekly Check',
              '',
              `**Trigger:** ${veryStaleCount} skill(s) er "very-stale" (90+ dager uten oppdatering AND 50+ commits til scope siste 60 dager).`,
              '',
              `**Total stale:** ${staleCount} (inkludert very-stale)`,
              '',
              'Disse skills må enten:',
              '- **Refreshes** med oppdatert innhold (commit-message: `docs(skills): refresh <name> [skill-refreshed: <name>]`)',
              '- **Deprecated** hvis ikke lenger relevant (sett `status: deprecated` i front-matter eller flytt til `.claude/skills/_archive/`)',
              '- **Scope-justeres** hvis filene har flyttet eller endret seg drastisk',
              '',
              'Se [`docs/engineering/SKILL_FRESHNESS.md`](../blob/main/docs/engineering/SKILL_FRESHNESS.md) for detaljer.',
              '',
              '---',
              '',
              '## Full rapport',
              '',
              report,
              '',
              '---',
              '',
              '_Auto-generert av `.github/workflows/skill-freshness-weekly.yml`. Lukker manuelt etter review._',
              '',
            ];
            const body = lines.join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['skill-freshness', 'documentation'],
            });
            console.log(`Opprettet issue #${issue.number}: ${issue.html_url}`);

      - name: Post summary to Actions
        if: always()
        run: |
          {
            echo "## Skill Freshness Report"
            echo ""
            echo "**Very-stale:** ${{ steps.detect.outputs.very_stale_count }} (trigger issue ved ≥ 1)"
            echo "**Stale:** ${{ steps.detect.outputs.stale_count }}"
            echo "**Scope-undefined:** ${{ steps.detect.outputs.scope_undefined }} (mangler \`<!-- scope: ... -->\` header)"
            echo ""
            if [ -f /tmp/skill-freshness/report.md ]; then
              cat /tmp/skill-freshness/report.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload rapport as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-freshness-report
          path: /tmp/skill-freshness/
          retention-days: 30
