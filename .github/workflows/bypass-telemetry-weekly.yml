name: Bypass Telemetry Weekly

# Fase A av ADR-0024 follow-up. Genererer ukentlig rapport over bypass-bruk
# på tvers av alle PM-håndhevings-gates. Triggers konsolideringskriteriene
# i ADR-0024 §"Bypass-policy" automatisk når terskel treffes.

on:
  schedule:
    - cron: "0 18 * * 0" # Søndag 18:00 UTC
  workflow_dispatch: # Manuell kjøring

jobs:
  generate-report:
    name: Generate bypass-telemetry report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch PR data and generate report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/telemetry
          # Fetch last 30-day PR-set
          SINCE=$(date -u -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -u -v-30d +%Y-%m-%d)
          gh pr list \
            --state closed \
            --search "is:merged merged:>${SINCE}" \
            --json number,title,body,author,labels,mergedAt,headRefName \
            --limit 500 \
            > /tmp/telemetry/prs-30d.json

          node scripts/bypass-telemetry.mjs \
            --input-file /tmp/telemetry/prs-30d.json \
            --report \
            --days 30 \
            --output /tmp/telemetry/report-30d.md

          # Also generate JSON for issue-creation logic
          node scripts/bypass-telemetry.mjs \
            --input-file /tmp/telemetry/prs-30d.json \
            --json \
            --days 30 \
            > /tmp/telemetry/stats-30d.json

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bypass-telemetry-30d
          path: /tmp/telemetry/

      - name: Check consolidation flags + open issue if triggered
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const stats = JSON.parse(fs.readFileSync('/tmp/telemetry/stats-30d.json', 'utf8'));
            const report = fs.readFileSync('/tmp/telemetry/report-30d.md', 'utf8');

            // If consolidation flags present, create or update issue
            if (stats.consolidationFlags.length === 0) {
              core.info('No consolidation flags triggered. No issue needed.');
              return;
            }

            const title = `Bypass-telemetry weekly: ${stats.consolidationFlags.length} consolidation flag(s) triggered`;
            const body = [
              report,
              '',
              '---',
              '',
              '🤖 Auto-generated by `.github/workflows/bypass-telemetry-weekly.yml`.',
              '',
              'Per ADR-0024 §"Bypass-policy": review flagged gates and decide:',
              '- (a) gate is too strict / wrong scope → consolidate',
              '- (b) bypass-pattern is legitimate but volume indicates new pattern → document',
              '- (c) false-positive in heuristic → adjust telemetry script',
            ].join('\n');

            // Find existing open issue with same title-prefix
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bypass-telemetry',
              per_page: 20,
            });
            const existing = issues.data.find(i => i.title.startsWith('Bypass-telemetry weekly'));

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Updated with new weekly report (${new Date().toISOString().slice(0, 10)}).`,
              });
              core.info(`Updated existing issue #${existing.number}`);
              return;
            }

            // Create new issue
            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bypass-telemetry', 'adr-0024-followup'],
            });
            core.notice(`Opened new issue #${created.data.number}`);
