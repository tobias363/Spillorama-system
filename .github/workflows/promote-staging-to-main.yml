name: Promote Staging To Main

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-staging-to-main
  cancel-in-progress: true

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or reuse staging -> main PR
        id: ensure_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          existing_pr="$(gh pr list \
            --base main \
            --head staging \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "${existing_pr}" ]]; then
            echo "Found existing PR #${existing_pr} (staging -> main)."
            echo "number=${existing_pr}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh pr create \
            --base main \
            --head staging \
            --title "Promote staging to main" \
            --body "Automatisk promotering fra staging til main."

          created_pr="$(gh pr list \
            --base main \
            --head staging \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -z "${created_pr}" ]]; then
            echo "Could not resolve created PR number." >&2
            exit 1
          fi

          echo "number=${created_pr}" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_number="${{ steps.ensure_pr.outputs.number }}"
          if [[ -z "${pr_number}" ]]; then
            echo "Missing PR number from previous step." >&2
            exit 1
          fi

          gh pr merge "${pr_number}" --auto --squash
