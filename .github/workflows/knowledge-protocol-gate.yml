name: Knowledge Protocol Gate

# Tobias-direktiv 2026-05-13/14:
# Pilot-, wallet- og compliance-endringer skal ikke merges uten at kunnskapen
# fra arbeidet blir lagt tilbake i skills + PITFALLS + AGENT_EXECUTION_LOG.

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  knowledge-protocol-enforcement:
    name: knowledge-protocol-enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce knowledge protocol for high-risk code
        uses: actions/github-script@v7
        with:
          script: |
            const RISK_PATHS = [
              'apps/backend/src/game/',
              'apps/backend/src/routes/agentGame1',
              'apps/backend/src/routes/agentGamePlan',
              'apps/backend/src/routes/adminGame1',
              'apps/backend/src/sockets/',
              'apps/backend/src/wallet/',
              'apps/backend/src/compliance/',
              'apps/backend/src/spillevett/',
              'apps/backend/src/adapters/PostgresWalletAdapter',
              'apps/backend/src/adapters/WalletAdapter',
              'packages/game-client/src/games/game1/',
              'packages/game-client/src/games/game2/',
              'packages/game-client/src/games/game3/',
              'apps/admin-web/src/pages/cash-inout/',
              'apps/admin-web/src/pages/agent-portal/',
            ];

            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const changed = files.map((f) => f.filename);
            const riskChanged = changed.filter((f) => RISK_PATHS.some((p) => f.startsWith(p)));

            if (riskChanged.length === 0) {
              core.info('No high-risk pilot/wallet/compliance files changed.');
              return;
            }

            const labels = new Set((pr.labels || []).map((l) => l.name));
            const body = pr.body || '';
            const bypass = /\[bypass-knowledge-protocol:\s*[^\]]+\]/i.test(body)
              || /knowledge-not-applicable:\s*.+/i.test(body);
            if (bypass) {
              if (labels.has('approved-knowledge-bypass')) {
                core.warning('Knowledge protocol bypass accepted because label approved-knowledge-bypass is present.');
                return;
              }
              core.setFailed('Knowledge protocol bypass/not-applicable requires label approved-knowledge-bypass.');
              return;
            }

            const hasPitfalls = changed.includes('docs/engineering/PITFALLS_LOG.md');
            const hasAgentLog = changed.includes('docs/engineering/AGENT_EXECUTION_LOG.md');
            const hasSkill = changed.some((f) => /^\.claude\/skills\/[^/]+\/SKILL\.md$/.test(f));
            const missing = [];
            if (!hasPitfalls) missing.push('docs/engineering/PITFALLS_LOG.md');
            if (!hasAgentLog) missing.push('docs/engineering/AGENT_EXECUTION_LOG.md');
            if (!hasSkill) missing.push('.claude/skills/<relevant>/SKILL.md');

            if (missing.length === 0) {
              core.info('Knowledge protocol satisfied.');
              return;
            }

            const marker = '<!-- knowledge-protocol-gate -->';
            const comment = [
              marker,
              '',
              '## ⛔ Knowledge protocol mangler',
              '',
              `Denne PR-en endrer high-risk pilot/wallet/compliance-kode (${riskChanged.length} fil(er)), men mangler påkrevd kunnskapsoppdatering.`,
              '',
              '**Mangler:**',
              ...missing.map((m) => `- \`${m}\``),
              '',
              '**Endrede high-risk filer:**',
              '```',
              riskChanged.slice(0, 30).join('\n') + (riskChanged.length > 30 ? `\n... (+${riskChanged.length - 30} flere)` : ''),
              '```',
              '',
              'Enten legg dokumentasjonen i samme PR, eller bruk `[bypass-knowledge-protocol: <grunn>]` / `knowledge-not-applicable: <grunn>` i PR-body og få label `approved-knowledge-bypass` fra Tobias/CODEOWNER.',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.data.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: comment,
              });
            }
            core.setFailed(`Knowledge protocol missing: ${missing.join(', ')}`);
