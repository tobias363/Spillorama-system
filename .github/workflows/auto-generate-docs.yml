name: Auto-generate architecture docs

# Auto-genererer docs/auto-generated/ ved hver push til main + manuelt.
# Begrunnelse: håndskrevne arkitektur-dokumenter blir stale; agenter
# leser dem og handler på utdatert info. Generatoren kjører fra
# kildene (openapi.yaml, migrations, package.json, SKILL.md) så det
# alltid finnes en current-state-snapshot agenter kan stole på.

on:
  push:
    branches: [main]
    # Kjør bare hvis kilder for genereringen faktisk endret seg
    paths:
      - 'apps/backend/openapi.yaml'
      - 'apps/backend/migrations/**'
      - 'apps/backend/src/**'
      - 'apps/admin-web/src/**'
      - 'packages/**'
      - 'apps/*/package.json'
      - 'packages/*/package.json'
      - '.claude/skills/**'
      - 'scripts/generate-architecture-docs.sh'
      - '.github/workflows/auto-generate-docs.yml'
  workflow_dispatch:

# PR-flyt for å respektere branch-protection. Vi committer ikke direkte
# til main lenger — i stedet åpner vi en PR som auto-merger via squash.
# Begrunnelse: direct-push til protected main blir avvist av GH006.
# Workflow må respektere "4 of 4 required status checks are expected".
permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    # Hopp over self-trigger ved [skip ci]-commit-meldinger
    # (eller PR-er fra denne workflowen selv)
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[auto-doc]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run generator
        run: |
          chmod +x scripts/generate-architecture-docs.sh
          ./scripts/generate-architecture-docs.sh

      - name: Detect changes
        id: detect
        run: |
          git add docs/auto-generated/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "[auto-doc] No changes — skipping PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Reset stage — la create-pull-request action håndtere staging
            git reset HEAD docs/auto-generated/ >/dev/null 2>&1 || true
          fi

      - name: Create or update auto-doc PR
        if: steps.detect.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(auto-doc): refresh architecture artefacts from main

            [auto-doc] Auto-generated from .github/workflows/auto-generate-docs.yml
            after merge of ${{ github.event.head_commit.id }}.
          branch: auto-doc/refresh-snapshot
          delete-branch: true
          base: main
          title: "chore(auto-doc): refresh architecture artefacts"
          body: |
            ## Summary

            Auto-generated update of `docs/auto-generated/` from latest `main`.
            Trigger commit: ${{ github.event.head_commit.id }}.

            ## Why PR-flyt instead of direct push?

            GH006 (`Protected branch update failed`) blocks direct push to `main`
            because branch-protection requires 4 status checks. This workflow now
            opens a PR which goes through the same checks as any other change.

            gate-not-applicable: ci-bot  <!-- verifiseres mot github-actions[bot] i pm-gate-enforcement.yml linje 170-175. Tidligere hardkodet gate-confirmed-hash fjernet 2026-05-16 (ADR-0024) — den kunne kopieres som universal bypass. -->
            resurrection-not-applicable: auto-doc-workflow — kun docs/auto-generated/ endres, ingen runtime-kode.

            ## Scope

            - [x] docs/

            ## Risk

            - [x] Low (auto-generated docs only, regenerable)

            ## Done-policy

            - [x] Auto-merge enabled (squash)
            - [x] All required CI checks must pass before merge

            🤖 Generated by `.github/workflows/auto-generate-docs.yml`
          labels: |
            auto-doc
            chore
          add-paths: |
            docs/auto-generated/

      - name: Enable auto-merge on PR
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR opened by previous step (search by branch + state)
          PR_NUM=$(gh pr list --head auto-doc/refresh-snapshot --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$PR_NUM" ]; then
            echo "[auto-doc] Enabling auto-merge on PR #$PR_NUM"
            gh pr merge "$PR_NUM" --squash --auto --delete-branch || echo "[auto-doc] auto-merge enable failed — PR may still merge manually"
          else
            echo "[auto-doc] No open PR found on branch auto-doc/refresh-snapshot — skipping auto-merge step"
          fi
