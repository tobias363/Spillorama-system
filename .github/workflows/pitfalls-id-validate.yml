name: PITFALLS ID Validate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    paths:
      - "docs/engineering/PITFALLS_LOG.md"
      - "scripts/check-pitfalls-ids.mjs"

permissions:
  contents: read

jobs:
  pitfalls-id-validation:
    name: pitfalls-id-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate unique PITFALLS IDs
        run: node scripts/check-pitfalls-ids.mjs
