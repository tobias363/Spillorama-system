name: Bug report
description: Report a defect affecting gameplay, wallet, auth, or admin.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
      placeholder: Short, concrete description
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, including room/hall/wallet context.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (prod outage / compliance risk)
        - High (major user impact)
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser/device + environment URL + commit/tag if known.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Logs / evidence
      description: Paste logs, request IDs, screenshots, or video links.
