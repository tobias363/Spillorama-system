services:
  backend:
    build:
      context: apps/backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-4000}:4000"
    env_file: apps/backend/.env.production
    environment:
      NODE_ENV: production
      PORT: "4000"
      APP_PG_CONNECTION_STRING: postgres://spillorama:spillorama@postgres:5432/spillorama
      REDIS_URL: redis://redis:6379
      ROOM_STATE_PROVIDER: redis
      SCHEDULER_LOCK_PROVIDER: redis
      WALLET_PROVIDER: postgres
      WALLET_PG_CONNECTION_STRING: postgres://spillorama:spillorama@postgres:5432/spillorama
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    # OBS-7 (2026-05-14): Aktiver pg_stat_statements + slow-query-log for
    # DB-observability. Krevd av migration 20261225000000 + PgHero (OBS-8).
    # `shared_preload_libraries` kan KUN settes ved process-start — derfor
    # via `command:` her, ikke via ALTER SYSTEM. Migration installerer
    # extension-en mens denne config-en sørger for at den faktisk laster.
    # Uten denne `command:`-blokken samler pg_stat_statements ingen data,
    # og PgHero-dashbordet viser tomme tabeller (det var problemet vi fikset
    # 2026-05-14 da Tobias rapporterte at OBS-7/OBS-8 var "installert men
    # ikke aktivert").
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "log_min_duration_statement=100"
      - "-c"
      - "log_statement=ddl"
      - "-c"
      - "log_line_prefix=%t [%p] %u@%d "
      - "-c"
      - "log_destination=stderr"
    environment:
      POSTGRES_DB: spillorama
      POSTGRES_USER: spillorama
      POSTGRES_PASSWORD: spillorama
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spillorama"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
