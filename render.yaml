services:
  - type: web
    name: spillorama-system
    runtime: node
    region: frankfurt
    plan: standard
    # IaC speiler faktisk Render-plan (oppgradert fra `free` → `standard`
    # 2026-05-08 for å fjerne 15-min-sleep-issue + gi 2 GB RAM headroom for
    # 4-hall-pilot Q3 2026). Web-tjenesten har dermed:
    #   - 2 GB RAM, 1 CPU, $25/mnd
    #   - Aldri sove (kritisk for pilot-kveld T-30min final-sjekk)
    #   - SSH-tilgang for debug
    #   - Persistent disk-støtte
    #   - Zero-downtime deploys
    # bingo-db er separat og ble samtidig oppgradert fra `basic_256mb` →
    # `pro_4gb` ($95/mnd) for PITR-aktivering (30 dagers retention,
    # auto-failover-readiness). DB-plan styres IKKE i denne render.yaml —
    # konfigureres i Render-dashboardet og er ikke i Blueprint-IaC.
    # Migrate prod-DB ved hvert deploy. KRITISK: før denne ble lagt til
    # (2026-04-26) hadde prod-DB 95 pending migrations som førte til
    # "Uventet feil i server"-bugs (manglende tabell `app_user_profile_settings`
    # traff Spill 1-spillere). Hvis migrate feiler, deploy stopper
    # og app forblir på forrige versjon (fail-fast).
    # Skjema-arkeolog-PR (ops/schema-sync-plan-2026-04-26) må lande FØRST
    # for å bringe prod i lock-step — ellers vil neste deploy henge på
    # legacy-skjema-divergens. Se docs/operations/MIGRATION_DEPLOY_RUNBOOK.md.
    buildCommand: npm install --include=dev && npm --prefix apps/backend install --include=dev && npm run build && npm --prefix apps/backend run migrate
    startCommand: npm --prefix apps/backend run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: APP_PG_CONNECTION_STRING
        sync: false
      - key: APP_PG_SCHEMA
        value: public
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_TLS
        value: "true"
      - key: MSSQL_DB_SERVER
        sync: false
      - key: MSSQL_DB_DATABASE
        sync: false
      - key: MSSQL_DB_PORT
        sync: false
      - key: MSSQL_DB_USERNAME
        sync: false
      - key: MSSQL_DB_PASSWORD
        sync: false
      - key: DEFAULT_ADMIN_USER_LOGIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_USER_LOGIN_PASSWORD
        sync: false
      - key: VERIFONE_ENTITY_ID
        sync: false
      - key: VERIFONE_CONTRACT_ID
        sync: false
      - key: VERIFONE_USER_ID
        sync: false
      - key: VERIFONE_API_ID
        sync: false
      - key: METRONIA_API_URL
        sync: false
      - key: METRONIA_API_TOKEN_TEST
        sync: false
      - key: IDKOLLEN_URL
        sync: false
      - key: IDKOLLEN_API_KEY
        sync: false
      - key: IDKOLLEN_SECRET
        sync: false
      - key: SVEVE_USERNAME
        sync: false
      - key: SVEVE_PASSWORD
        sync: false
      - key: SVEVE_SENDER
        sync: false
      - key: SWEDBANKPAY_PAYEE_ID
        sync: false
      - key: SWEDBANKPAY_TOKEN
        sync: false
      - key: SWEDBANKPAY_PAYEE_NAME
        sync: false
      - key: SWEDBANKPAY_PAYMENT_API_URL
        sync: false
      - key: SWEDBANKPAY_PAYMENT_CURRENCY_CODE
        value: NOK
      - key: SWEDBANKPAY_HOST_URLS
        sync: false
      - key: SWEDBANKPAY_PAYMENT_URL
        sync: false
      - key: SWEDBANKPAY_COMPLETE_URL
        sync: false
      - key: SWEDBANKPAY_CANCEL_URL
        sync: false
      - key: SWEDBANKPAY_CALLBACK_URL
        sync: false
      - key: SWEDBANKPAY_TERMS_OF_SERVICE_URL
        sync: false
      - key: FIREBASE_ADMIN_DB_URL
        sync: false
      # BIN-FCM: push-notifikasjoner. Base64-encoded service-account JSON.
      # Se docs/operations/FCM_PUSH_NOTIFICATIONS.md for oppsett.
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Candy integration
      - key: EXT_GAME_WALLET_API_KEY
        sync: false
      - key: CANDY_BACKEND_URL
        value: https://candy-backend-ldvg.onrender.com
      - key: CANDY_INTEGRATION_API_KEY
        sync: false
      # OBS-2 (2026-05-13): Sentry observability.
      # Same DSN is used by the game-client via VITE_SENTRY_DSN; the build
      # injects it at compile time so it doesn't need a separate env var
      # here unless we later split into two projects.
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: SENTRY_PROFILES_SAMPLE_RATE
        value: "0.0"
      # OBS-5: PostHog event-analytics. Same write-only key is used for
      # backend (POSTHOG_API_KEY) and client bundle (VITE_POSTHOG_API_KEY).
      # Host defaults to EU cloud. sync:false → set the actual key value
      # via the Render dashboard so it isn't committed to git.
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://eu.i.posthog.com
      - key: VITE_POSTHOG_API_KEY
        sync: false
      - key: VITE_POSTHOG_HOST
        value: https://eu.i.posthog.com
